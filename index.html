<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0;}
    .container{padding:20px;}
    .screen{display:none;} 
    .active{display:block;}
    button{padding:8px;margin:4px;border:none;border-radius:6px;background:#1e293b;color:white;cursor:pointer;}
    input{padding:6px;margin:4px;border-radius:6px;border:none;}
    table{width:100%;border-collapse:collapse;margin-top:10px;}
    th,td{padding:6px;border:1px solid #333;text-align:center;}
    .card{background:#1e293b;padding:10px;margin:5px 0;border-radius:8px;}
  </style>
</head>

<body>

<div id="headerEvento" style="position:sticky;top:0;background:#020617;padding:15px;display:flex;justify-content:space-between;">
  <div style="display:flex;gap:10px;align-items:center;">
    <img src="logo.png" style="height:40px;">
    <b>Top Access</b>
  </div>
  <div id="infoEvento"></div>
</div>

<div class="container">

<div id="home" class="screen active">
  <h1>Inicio</h1>
  <button onclick="ir('crearEvento')">Crear evento</button>
  <button onclick="ir('eventos')">Eventos</button>
</div>

<div id="crearEvento" class="screen">
  <h1>Crear evento</h1>
  <button onclick="ir('home')">⬅</button>
  <input id="nombreEvento" placeholder="Nombre">
  <input id="venueEvento" placeholder="Venue">
  <button onclick="crearEvento()">Guardar</button>
</div>

<div id="eventos" class="screen">
  <h1>Eventos</h1>
  <button onclick="ir('home')">⬅</button>

  <input id="busquedaEvento" placeholder="Buscar evento...">

  <br>

  <label>Desde:</label>
  <input type="date" id="fechaInicio">

  <label>Hasta:</label>
  <input type="date" id="fechaFin">

  <button onclick="filtrarEventos()">🔍 Buscar</button>
  <button onclick="cargarEventos()">♻ Reset</button>

  <div id="listaEventos"></div>
</div>

<div id="gestion" class="screen">
  <h1>Gestión</h1>
  <button onclick="ir('eventos')">⬅</button>
  <button onclick="ir('stats')">Stats</button>
  <button onclick="ir('inc')">Incidencias</button>
  <button onclick="ir('upload')">CSV</button>
  <button onclick="ir('accesos')">Accesos</button>
  <button onclick="ir('asociacion')">Asociación</button>
</div>

<div id="accesos" class="screen">
  <h1>Accesos</h1>
  <button onclick="ir('gestion')">⬅</button>
  <input id="nombreAcceso">
  <button onclick="crearAcceso()">Crear</button>
  <div id="listaAccesos"></div>
</div>

<div id="asociacion" class="screen">
  <h1>Asociación</h1>
  <button onclick="ir('gestion')">⬅</button>
  <div id="tabla"></div>
</div>

<div id="stats" class="screen">
  <h1>📊 Dashboard</h1>
  <button onclick="ir('gestion')">⬅</button>

  <div id="tablaStats"></div>

  <canvas id="graficoZonas" height="120"></canvas>
  <canvas id="graficoTicket" height="120"></canvas>
</div>

<div id="inc" class="screen">
  <h1>Incidencias</h1>
  <button onclick="ir('gestion')">⬅</button>
  <table><tbody id="tablaInc"></tbody></table>
</div>

<div id="upload" class="screen">
  <h1>CSV</h1>
  <button onclick="ir('gestion')">⬅</button>
  <input type="file" id="fileInput">
  <button onclick="subir()">Subir</button>
</div>

</div>

<script>
const client = supabase.createClient("https://zuhssrhdezptsgemxofh.supabase.co","KEY");

let currentEvent=null;
let currentVenue=null;
let eventosGlobal=[];

function ir(p){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(p).classList.add("active");

 if(p==="eventos") cargarEventos();
 if(p==="accesos") cargarAccesos();
 if(p==="asociacion") cargarMatriz();
 if(p==="stats") cargarStats();
 if(p==="inc") cargarInc();
}

async function crearEvento(){
 await client.from("events").insert({
   name:document.getElementById("nombreEvento").value,
   venue:document.getElementById("venueEvento").value
 });
 ir("eventos");
}

async function cargarEventos(){

 const {data,error}=await client.from("events").select("*");

 if(error){
   console.log(error);
   alert("Error cargando eventos");
   return;
 }

 eventosGlobal = data || [];

 // 🔥 ORDENAR POR FECHA (más recientes primero)
 eventosGlobal.sort((a,b)=> 
   new Date(b.event_date || 0) - new Date(a.event_date || 0)
 );

 // 🔥 SIEMPRE mostrar todos al entrar
 renderEventos(eventosGlobal);
}

function renderEventos(lista){

 if(!lista || lista.length === 0){
   document.getElementById("listaEventos").innerHTML = "No hay eventos";
   return;
 }

 document.getElementById("listaEventos").innerHTML =
 lista.map(e=>`
   <div class="card">
     <b>${e.name}</b><br>
     📍 ${e.venue || ""}<br>
     📅 ${e.event_date || "Sin fecha"}<br>
     <br>
     <button onclick="entrar('${e.id}','${e.venue}')">Entrar</button>
   </div>
 `).join("");
}

function filtrarEventos(){

 const texto = document.getElementById("busquedaEvento").value.toLowerCase();
 const inicio = document.getElementById("fechaInicio").value;
 const fin = document.getElementById("fechaFin").value;

 let filtrados = eventosGlobal;

 // 🔍 FILTRO TEXTO
 if(texto){
   filtrados = filtrados.filter(e =>
     (e.name || "").toLowerCase().includes(texto)
   );
 }

 // 📅 FILTRO FECHA DESDE
 if(inicio){
   filtrados = filtrados.filter(e =>
     e.event_date && e.event_date >= inicio
   );
 }

 // 📅 FILTRO FECHA HASTA
 if(fin){
   filtrados = filtrados.filter(e =>
     e.event_date && e.event_date <= fin
   );
 }

 renderEventos(filtrados);
}

async function entrar(id,venue){
 currentEvent=id;
 currentVenue=venue;
 const {data}=await client.from("events").select("*").eq("id",id).single();
 document.getElementById("infoEvento").innerText=data.name;
 ir("gestion");
}

//////////////////////////////////////////////////
// ACCESOS
//////////////////////////////////////////////////

async function crearAcceso(){
 await client.from("access_points").insert({
   name:document.getElementById("nombreAcceso").value,
   venue:currentVenue
 });
 cargarAccesos();
}

async function cargarAccesos(){
 const {data}=await client.from("access_points").select("*").eq("venue",currentVenue);
 document.getElementById("listaAccesos").innerHTML=
 data.map(a=>`<div>${a.name}</div>`).join("");
}

//////////////////////////////////////////////////
// ASOCIACION
//////////////////////////////////////////////////

async function cargarMatriz(){

 const {data:codes}=await client.from("codes")
 .select("zone_id,ticket_provider_id,zones(name),ticket_providers(name)")
 .eq("event_id",currentEvent);

 const {data:acc}=await client.from("access_points").select("*").eq("venue",currentVenue);
 const {data:rel}=await client.from("ticket_zone_access").select("*");

 const combos={};
 codes.forEach(c=>{
  const k=c.zone_id+"_"+c.ticket_provider_id;
  combos[k]=c;
 });

 let html="<table><tr><th>Concepto</th>";
 acc.forEach(a=>html+=`<th>${a.name}</th>`);
 html+="</tr>";

 Object.values(combos).forEach(c=>{
  html+=`<tr><td>${c.zones?.name} - ${c.ticket_providers?.name}</td>`;

  acc.forEach(a=>{
   const ok=rel.some(r=>r.zone_id===c.zone_id && r.ticket_provider_id===c.ticket_provider_id && r.access_id===a.id);
   html+=`<td><input type="checkbox" ${ok?"checked":""}
   onchange="toggleAcceso('${c.zone_id}','${c.ticket_provider_id}','${a.id}',this.checked)"></td>`;
  });

  html+="</tr>";
 });

 html+="</table>";
 document.getElementById("tabla").innerHTML=html;
}

async function toggleAcceso(z,t,a,e){
 if(e){
   await client.from("ticket_zone_access").insert({
     zone_id:z,ticket_provider_id:t,access_id:a
   });
 }else{
   await client.from("ticket_zone_access")
   .delete()
   .eq("zone_id",z)
   .eq("ticket_provider_id",t)
   .eq("access_id",a);
 }
}

//////////////////////////////////////////////////
// STATS PRO
//////////////////////////////////////////////////

let chartZonas=null;
let chartTicket=null;

async function cargarStats(){

 const {data}=await client.from("codes")
   .select("*,zones(name),ticket_providers(name)")
   .eq("event_id",currentEvent);

 if(!data) return;

 let total=0, usados=0;

 const porZona={};
 const porTicket={};

 data.forEach(c=>{

   total++;

   if(c.usage_count>0){
     usados++;

     const zona=c.zones?.name || "Sin zona";
     const ticket=c.ticket_providers?.name || "Sin ticketera";

     // zona
     if(!porZona[zona]) porZona[zona]=0;
     porZona[zona]++;

     // ticketera
     if(!porTicket[ticket]) porTicket[ticket]=0;
     porTicket[ticket]++;
   }
 });

 // 🔹 RESUMEN
 document.getElementById("tablaStats").innerHTML = `
   <div class="card">
     🎟 Total: ${total} <br>
     ✅ Usados: ${usados} <br>
     ⏳ Pendientes: ${total-usados}
   </div>
 `;

 // 🔥 GRAFICO ZONAS
 const zonasLabels=Object.keys(porZona);
 const zonasData=Object.values(porZona);

 if(chartZonas) chartZonas.destroy();

 chartZonas=new Chart(document.getElementById("graficoZonas"),{
   type:"bar",
   data:{
     labels:zonasLabels,
     datasets:[{
       label:"Accesos por zona",
       data:zonasData
     }]
   }
 });

 // 🔥 GRAFICO TICKETERA
 const ticketLabels=Object.keys(porTicket);
 const ticketData=Object.values(porTicket);

 if(chartTicket) chartTicket.destroy();

 chartTicket=new Chart(document.getElementById("graficoTicket"),{
   type:"pie",
   data:{
     labels:ticketLabels,
     datasets:[{
       label:"Ticketera",
       data:ticketData
     }]
   }
 });
}

//////////////////////////////////////////////////
// INCIDENCIAS
//////////////////////////////////////////////////

async function cargarInc(){
 const {data}=await client.from("codes")
 .select("*,zones(name),ticket_providers(name)")
 .eq("event_id",currentEvent);

 document.getElementById("tablaInc").innerHTML=
 data.map(c=>`
 <tr>
 <td>${c.code_value}</td>
 <td>${c.zones?.name}</td>
 <td>${c.ticket_providers?.name}</td>
 <td>${c.usage_count}</td>
 <td>${c.status}</td>
 <td>
 <button onclick="usar('${c.id}')">✔</button>
 <button onclick="reset('${c.id}')">↺</button>
 <button onclick="cancelar('${c.id}')">✖</button>
 <button onclick="multi('${c.id}')">M</button>
 </td>
 </tr>`).join("");
}

async function usar(id){
 await client.from("codes").update({usage_count:1}).eq("id",id);
}

async function reset(id){
 await client.from("codes").update({usage_count:0}).eq("id",id);
}

async function cancelar(id){
 await client.from("codes").update({status:"cancelled"}).eq("id",id);
}

async function multi(id){
 await client.from("codes").update({is_top_code:true}).eq("id",id);
}

//////////////////////////////////////////////////
// CSV
//////////////////////////////////////////////////

async function subir(){

 const file=document.getElementById("fileInput").files[0];
 if(!file) return alert("Selecciona archivo");

 const text=await file.text();
 const lines=text.split("\n");

 if(lines.length<2) return alert("Archivo vacío");

 // 🔹 DETECTAR CABECERAS
 const headers = lines[0].toLowerCase().split(";");

 const idxCodigo = headers.findIndex(h => h.includes("code") || h.includes("codigo"));
 const idxZona = headers.findIndex(h => h.includes("zone") || h.includes("zona"));
 const idxTicket = headers.findIndex(h => h.includes("ticket") || h.includes("provider"));

 if(idxCodigo === -1) return alert("No se detecta columna código");

 // 🔹 CARGAR DATOS EXISTENTES
 const {data:exist} = await client
   .from("codes")
   .select("code_value")
   .eq("event_id",currentEvent);

 const existentes = new Set(exist.map(e=>e.code_value));

 const {data:zonas} = await client.from("zones").select("*");
 const {data:ticket} = await client.from("ticket_providers").select("*");

 const zonasMap = {};
 zonas.forEach(z=>zonasMap[z.name.toLowerCase()] = z);

 const ticketMap = {};
 ticket.forEach(t=>ticketMap[t.name.toLowerCase()] = t);

 const insertar=[];

 // 🔹 PROCESAR FILAS
 for(let i=1;i<lines.length;i++){

   const cols = lines[i].split(";");

   const codigo = cols[idxCodigo]?.trim();
   if(!codigo || existentes.has(codigo)) continue;

   let zonaId=null;
   let ticketId=null;

   // 🔹 ZONA
   if(idxZona !== -1){
     const nombreZona = cols[idxZona]?.trim().toLowerCase();

     if(nombreZona){
       if(!zonasMap[nombreZona]){
         const {data:newZona} = await client.from("zones").insert({name:nombreZona}).select().single();
         zonasMap[nombreZona] = newZona;
       }
       zonaId = zonasMap[nombreZona].id;
     }
   }

   // 🔹 TICKETERA
   if(idxTicket !== -1){
     const nombreTicket = cols[idxTicket]?.trim().toLowerCase();

     if(nombreTicket){
       if(!ticketMap[nombreTicket]){
         const {data:newTicket} = await client.from("ticket_providers").insert({name:nombreTicket}).select().single();
         ticketMap[nombreTicket] = newTicket;
       }
       ticketId = ticketMap[nombreTicket].id;
     }
   }

   insertar.push({
     event_id:currentEvent,
     code_value:codigo,
     zone_id:zonaId,
     ticket_provider_id:ticketId,
     status:"valid",
     usage_count:0
   });
 }

 if(insertar.length===0) return alert("No hay nuevos códigos");

 await client.from("codes").insert(insertar);

 alert("CSV inteligente cargado correctamente");
}

//////////////////////////////////////////////////
// REFRESH
//////////////////////////////////////////////////

setInterval(()=>{
 if(currentEvent){
  cargarStats();
  cargarInc();
 }
},5000);

</script>

</body>
</html>
