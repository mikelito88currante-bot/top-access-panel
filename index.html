<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="ir('eventos')">Seleccionar evento</button>
  </div>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>
  <h2>Eventos</h2>
  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="ir('upload')">📂 Cargar CSV</button>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>

  <h2>📂 Subir códigos (CSV)</h2>

  <input type="file" id="fileInput">
  <br>
  <button onclick="subir()">Subir archivo</button>

  <div id="resultado"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAVEGACIÓN
function ir(pantalla) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(pantalla).classList.add("active");

  if (pantalla === "eventos") cargarEventos();
}

// CARGAR EVENTOS
async function cargarEventos() {
  const { data, error } = await client.from("events").select("*");

  const cont = document.getElementById("listaEventos");
  cont.innerHTML = "";

  if (error) {
    cont.innerHTML = "Error cargando eventos";
    return;
  }

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      ${e.venue || ""}<br>
      <button onclick="seleccionarEvento('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

// SELECCIONAR EVENTO
function seleccionarEvento(id) {
  currentEvent = id;
  ir("gestion");
}

// SUBIR CSV (CORREGIDO)
async function subir() {

  if (!currentEvent) {
    alert("Selecciona un evento primero");
    return;
  }

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Selecciona un archivo");
    return;
  }

  const text = await file.text();
  const lines = text.split("\n");

  const insertar = [];

  for (let i = 1; i < lines.length; i++) {

    const cols = lines[i].split(",");
    const codigo = cols[0]?.trim();

    if (!codigo) continue;

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid",
      usage_count: 0,

      // 🔥 SOLUCIÓN ERROR zone_id
      zone_id: "default-zone",
      ticket_provider_id: "default"
    });
  }

  console.log("INSERTAR:", insertar);

  const { data, error } = await client
    .from("codes")
    .insert(insertar)
    .select();

  console.log("RESPUESTA:", data, error);

  if (error) {
    alert("ERROR: " + error.message);
    return;
  }

  alert("Códigos insertados: " + data.length);

  document.getElementById("resultado").innerText =
    "Insertados correctamente: " + data.length;
}
</script>

</body>
</html>
