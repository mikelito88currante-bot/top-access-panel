<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
    .screen{display:none;} .active{display:block;}
    button{padding:8px;margin:4px;border:none;border-radius:6px;background:#1e293b;color:white;}
    table{width:100%;margin-top:10px;border-collapse:collapse;}
    td,th{padding:6px;border-bottom:1px solid #333;}
    .card{background:#1e293b;padding:10px;margin:5px;border-radius:8px;}
  </style>
</head>

<body>

<div id="gestion" class="screen active">
  <h1>⚙️ Gestión</h1>
  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('incidencias')">⚠️ Incidencias</button>
</div>

<div id="stats" class="screen">
  <h1>📊 Estadísticas</h1>
  <button onclick="ir('gestion')">⬅</button>
  <div id="tablaStats"></div>
</div>

<div id="incidencias" class="screen">
  <h1>⚠️ Incidencias</h1>
  <button onclick="ir('gestion')">⬅</button>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Zona</th>
        <th>Ticketera</th>
        <th>Estado</th>
        <th>Hora</th>
        <th>Dispositivo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaInc"></tbody>
  </table>
</div>

<script>
const client = window.supabase.createClient(
 "https://zuhssrhdezptsgemxofh.supabase.co",
 "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = "d8026425-6e24-4b8a-8891-4ac81057e6f2"; // usa uno tuyo

function ir(p){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(p).classList.add("active");

 if(p==="stats") cargarStats();
 if(p==="incidencias") cargarInc();
}

//////////////////////////////////////////////////////////
// 📊 ESTADÍSTICAS
//////////////////////////////////////////////////////////

async function cargarStats(){

 const {data}=await client
   .from("codes")
   .select("*, zones(name), ticket_providers(name)")
   .eq("event_id",currentEvent);

 const agrupado={};

 data.forEach(c=>{

   const key = c.zones.name + " - " + c.ticket_providers.name;

   if(!agrupado[key]){
     agrupado[key]={pend:0, used:0, total:0};
   }

   agrupado[key].total++;

   if(c.status==="valid") agrupado[key].pend++;
   if(c.status==="used") agrupado[key].used++;

 });

 let html="<table><tr><th>Origen</th><th>Pendientes</th><th>Usadas</th><th>Total</th></tr>";

 for(let k in agrupado){
   html+=`<tr>
     <td>${k}</td>
     <td>${agrupado[k].pend}</td>
     <td>${agrupado[k].used}</td>
     <td>${agrupado[k].total}</td>
   </tr>`;
 }

 html+="</table>";

 document.getElementById("tablaStats").innerHTML=html;
}

//////////////////////////////////////////////////////////
// ⚠️ INCIDENCIAS
//////////////////////////////////////////////////////////

async function cargarInc(){

 const {data}=await client
   .from("codes")
   .select("*, zones(name), ticket_providers(name)")
   .eq("event_id",currentEvent);

 const tbody=document.getElementById("tablaInc");
 tbody.innerHTML="";

 data.forEach(c=>{

   tbody.innerHTML+=`
   <tr>
     <td>${c.code_value}</td>
     <td>${c.zones?.name||""}</td>
     <td>${c.ticket_providers?.name||""}</td>
     <td>${c.status}</td>
     <td>${c.used_at||"-"}</td>
     <td>${c.used_device||"-"}</td>
     <td>
       <button onclick="usar('${c.id}')">Usar</button>
       <button onclick="liberar('${c.id}')">Liberar</button>
       <button onclick="cancelar('${c.id}')">Cancelar</button>
       <button onclick="multi('${c.id}')">Multi</button>
     </td>
   </tr>`;
 });
}

//////////////////////////////////////////////////////////
// ✏️ ACCIONES
//////////////////////////////////////////////////////////

async function usar(id){
 await client.from("codes").update({
   status:"used",
   used_at:new Date(),
   used_device:"web"
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function liberar(id){
 await client.from("codes").update({
   status:"valid",
   used_at:null,
   used_device:null
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function cancelar(id){
 await client.from("codes").update({
   status:"cancelled"
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function multi(id){
 await client.from("codes").update({
   is_multi:true
 }).eq("id",id);

 alert("Código multiread activado");
}

</script>

</body>
</html>
