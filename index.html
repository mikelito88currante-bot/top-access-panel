<!DOCTYPE html>
<html>
<head>
  <title>Top Access Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 { margin-bottom: 20px; }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 300px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover { background: #334155; }

    .hidden { display: none; }

    input {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
      width: 300px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
    }

    ul {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    canvas {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .back {
      margin-bottom: 20px;
      background: #334155;
    }
  </style>
</head>

<body>

<!-- 🔥 HOME -->
<div id="home">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="irDashboard()">Seleccionar evento</button>
    <button onclick="irCrearEvento()">Crear evento</button>
    <button>Usuarios</button>
    <button>Configuración de zonas</button>
    <button>Configuración de localizaciones</button>
  </div>
</div>

<!-- 🔥 CREAR EVENTO -->
<div id="crearEvento" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h1>Crear evento</h1>

  <input type="text" id="nombreEvento" placeholder="Nombre del evento">
  <input type="text" id="venueEvento" placeholder="Recinto">
  <input type="date" id="fechaEvento">

  <br>
  <button onclick="guardarEvento()">Guardar evento</button>

</div>

<!-- 🔥 DASHBOARD -->
<div id="dashboard" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h1>📊 Dashboard</h1>

  <select id="eventSelector"></select>

  <div class="cards">
    <div class="card">
      <div>Aforo actual</div>
      <div id="aforo">0</div>
    </div>

    <div class="card">
      <div>Entradas</div>
      <div id="entradas">0</div>
    </div>

    <div class="card">
      <div>Salidas</div>
      <div id="salidas">0</div>
    </div>
  </div>

  <h2>Últimos accesos</h2>
  <ul id="logs"></ul>

  <h2>Entradas por minuto</h2>
  <canvas id="grafico"></canvas>

</div>

<script>
  const client = window.supabase.createClient(
    "https://zuhssrhdezptsgemxofh.supabase.co",
    "TU_KEY"
  );

  let selectedEvent = null;
  let chart;

  // 🔹 NAVEGACIÓN
  function irDashboard() {
    ocultarTodo();
    document.getElementById("dashboard").classList.remove("hidden");
    cargarEventos();
  }

  function irCrearEvento() {
    ocultarTodo();
    document.getElementById("crearEvento").classList.remove("hidden");
  }

  function volverInicio() {
    ocultarTodo();
    document.getElementById("home").classList.remove("hidden");
  }

  function ocultarTodo() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("crearEvento").classList.add("hidden");
  }

  // 🔥 CREAR EVENTO REAL
  async function guardarEvento() {
    const nombre = document.getElementById("nombreEvento").value;
    const venue = document.getElementById("venueEvento").value;
    const fecha = document.getElementById("fechaEvento").value;

    if (!nombre || !venue || !fecha) {
      alert("Completa todos los campos");
      return;
    }

    const ahora = new Date().toISOString();

    const { error } = await client
      .from("events")
      .insert([{
        name: nombre,
        venue: venue,
        event_date: fecha,
        status: "active",
        capacity_max: 0,
        capacity_current: 0,
        created_at: ahora,
        updated_at: ahora,
        is_active: true,
        sync_interval_seconds: 5,
        logo_url: null,
        created_by: null,
        allow_capacity_override: false
      }]);

    if (error) {
      console.error(error);
      alert("Error al guardar: " + error.message);
    } else {
      alert("Evento creado correctamente");
      volverInicio();
    }
  }

  // 🔹 EVENTOS
  async function cargarEventos() {
    const { data } = await client
      .from("events")
      .select("id, name");

    const selector = document.getElementById("eventSelector");
    selector.innerHTML = "";

    data.forEach(event => {
      const option = document.createElement("option");
      option.value = event.id;
      option.textContent = event.name;
      selector.appendChild(option);
    });

    if (data.length > 0) {
      selectedEvent = data[0].id;
      cargarDatos();
    }
  }

  document.getElementById("eventSelector").addEventListener("change", (e) => {
    selectedEvent = e.target.value;
    cargarDatos();
  });

  // 🔹 LOGS
  async function cargarDatos() {
    if (!selectedEvent) return;

    const { data } = await client
      .from("logs")
      .select("*")
      .eq("event_id", selectedEvent);

    let entradas = 0;
    let salidas = 0;
    const porMinuto = {};

    data.forEach(log => {
      if (log.action_type === "entry") entradas++;
      if (log.action_type === "exit") salidas++;

      const fecha = new Date(log.created_at);
      const minuto = fecha.getHours() + ":" + String(fecha.getMinutes()).padStart(2, "0");

      if (!porMinuto[minuto]) porMinuto[minuto] = 0;

      if (log.action_type === "entry") porMinuto[minuto]++;
    });

    document.getElementById("entradas").textContent = entradas;
    document.getElementById("salidas").textContent = salidas;
    document.getElementById("aforo").textContent = entradas - salidas;

    const lista = document.getElementById("logs");
    lista.innerHTML = "";

    data.slice(-20).reverse().forEach(log => {
      const li = document.createElement("li");
      li.textContent = log.action_type + " - " + log.created_at;
      lista.appendChild(li);
    });

    const labels = Object.keys(porMinuto);
    const valores = Object.values(porMinuto);

    if (chart) chart.destroy();

    const ctx = document.getElementById("grafico").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Entradas por minuto",
          data: valores
        }]
      }
    });
  }

  setInterval(cargarDatos, 5000);
</script>

</body>
</html>
