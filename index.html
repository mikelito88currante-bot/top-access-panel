<!DOCTYPE html>
<html>
<head>
  <title>Top Access Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .menu { display: flex; flex-direction: column; gap: 15px; max-width: 300px; }

    button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    input { margin-bottom: 10px; }

    .back { margin-bottom: 20px; background: #334155; }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="irDashboard()">Seleccionar evento</button>
    <button onclick="irCrearEvento()">Crear evento</button>
    <button onclick="irSubirCodigos()">Subir códigos</button>
  </div>
</div>

<!-- SUBIR CODIGOS -->
<div id="subirCodigos" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h1>Subir códigos</h1>

  <select id="eventSelectorUpload"></select>

  <input type="file" id="fileInput" accept=".csv">

  <br>
  <button onclick="procesarArchivo()">Subir CSV</button>

</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let selectedEventUpload = null;

// NAV
function irSubirCodigos() {
  ocultarTodo();
  document.getElementById("subirCodigos").classList.remove("hidden");
  cargarEventosUpload();
}

function volverInicio() {
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function ocultarTodo() {
  document.querySelectorAll("div").forEach(d => d.classList.add("hidden"));
}

// CARGAR EVENTOS
async function cargarEventosUpload() {
  const { data } = await client.from("events").select("id,name");

  const selector = document.getElementById("eventSelectorUpload");
  selector.innerHTML = "";

  data.forEach(e => {
    const opt = document.createElement("option");
    opt.value = e.id;
    opt.textContent = e.name;
    selector.appendChild(opt);
  });

  selectedEventUpload = data[0]?.id;
}

document.getElementById("eventSelectorUpload").addEventListener("change", e => {
  selectedEventUpload = e.target.value;
});

// PROCESAR CSV
async function procesarArchivo() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Selecciona un archivo");
    return;
  }

  const text = await file.text();
  const lines = text.split("\n");

  const datos = [];

  for (let i = 1; i < lines.length; i++) {
    const [codigo, zona, ticketera] = lines[i].split(",");

    if (!codigo) continue;

    datos.push({
      event_id: selectedEventUpload,
      code_value: codigo.trim(),
      status: "valid",
      zone_id: null, // luego mapeamos zonas reales
      ticket_provider_id: null,
      usage_count: 0,
      created_at: new Date().toISOString()
    });
  }

  // 🔥 INSERTAR EN BLOQUE
  const { error } = await client.from("codes").insert(datos);

  if (error) {
    console.error(error);
    alert("Error al subir");
  } else {
    alert("Códigos subidos correctamente");
  }
}
</script>

</body>
</html>
