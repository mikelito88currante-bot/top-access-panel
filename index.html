<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      width: 300px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    .evento {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      background: #1e293b;
      border-radius: 10px;
      margin-top: 20px;
    }

    td, th {
      padding: 8px;
      text-align: center;
    }

    .clickable {
      cursor: pointer;
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="mostrar('listaEventos')">Seleccionar evento</button>
</div>

<!-- EVENTOS -->
<div id="listaEventos" class="screen">
  <button onclick="mostrar('home')">⬅ Volver</button>
  <div id="contenedorEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="mostrar('listaEventos')">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="mostrar('estadisticas')">📊 Estadísticas</button>
  <button onclick="mostrar('incidencias')">⚠️ Incidencias</button>
</div>

<!-- ESTADISTICAS -->
<div id="estadisticas" class="screen">
  <button onclick="mostrar('gestion')">⬅ Volver</button>

  <h2>📊 Estadísticas</h2>

  <table>
    <thead>
      <tr>
        <th>Zona</th>
        <th>Ticketera</th>
        <th>Pendientes</th>
        <th>Usadas</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tablaStats"></tbody>
  </table>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="screen">
  <button onclick="mostrar('gestion')">⬅ Volver</button>

  <h2>⚠️ Incidencias</h2>

  <input id="buscador" placeholder="Buscar código..." oninput="filtrarCodigos()">

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Estado</th>
        <th>Zona</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaIncidencias"></tbody>
  </table>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aHNzcmhkZXpwdHNnZW14b2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzE5MjcsImV4cCI6MjA4NTk0NzkyN30.Tb0y2zGuy3hGRimE5SY4zHIY8FMfgYt9uDofVQeKBX0"
);

let currentEvent = null;
let codigosGlobal = [];

// NAV
function mostrar(id) {
  document.querySelectorAll(".screen").forEach(d => d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "listaEventos") cargarEventos();
  if (id === "estadisticas") cargarStats();
  if (id === "incidencias") cargarIncidencias();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "evento";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      <button onclick="seleccionarEvento('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function seleccionarEvento(id) {
  currentEvent = id;
  mostrar("gestion");
}

// ESTADISTICAS
async function cargarStats() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  const resumen = {};

  data.forEach(c => {
    const zona = c.zone_id || "Sin zona";
    const ticket = c.ticket_provider_id || "Sin ticketera";

    const key = zona + "_" + ticket;

    if (!resumen[key]) {
      resumen[key] = { zona, ticket, usadas: 0, pendientes: 0 };
    }

    if (c.status === "used") resumen[key].usadas++;
    else resumen[key].pendientes++;
  });

  const tbody = document.getElementById("tablaStats");
  tbody.innerHTML = "";

  Object.values(resumen).forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.zona}</td>
      <td>${r.ticket}</td>
      <td>${r.pendientes}</td>
      <td>${r.usadas}</td>
      <td>${r.usadas + r.pendientes}</td>
    `;

    tbody.appendChild(tr);
  });
}

// INCIDENCIAS
async function cargarIncidencias() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  codigosGlobal = data;
  pintarTabla(data);
}

// FILTRO
function filtrarCodigos() {
  const texto = document.getElementById("buscador").value.toLowerCase();

  const filtrados = codigosGlobal.filter(c =>
    c.code_value.toLowerCase().includes(texto)
  );

  pintarTabla(filtrados);
}

// PINTAR TABLA
function pintarTabla(data) {
  const tbody = document.getElementById("tablaIncidencias");
  tbody.innerHTML = "";

  data.forEach(c => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${c.code_value}</td>
      <td>${c.status}</td>
      <td>${c.zone_id || "-"}</td>
      <td>
        <button onclick="toggleEstado('${c.id}', '${c.status}')">
          Cambiar
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// EDITAR
async function toggleEstado(id, estado) {

  const nuevo = estado === "used" ? "valid" : "used";

  await client
    .from("codes")
    .update({ status: nuevo })
    .eq("id", id);

  cargarIncidencias();
}
</script>

</body>
</html>
