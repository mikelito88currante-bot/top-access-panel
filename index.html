<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
    .screen{display:none;} .active{display:block;}
    button{padding:8px;margin:4px;border:none;border-radius:6px;background:#1e293b;color:white;}
    input{padding:6px;margin:4px;border-radius:6px;border:none;}

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th,td{
      padding:6px;
      border:1px solid #333;
      text-align:center;
    }

    .card{
      background:#1e293b;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🏠 Inicio</h1>

  <button onclick="ir('crearEvento')">➕ Crear evento</button>
  <button onclick="ir('eventos')">📅 Eventos</button>
</div>

<!-- CREAR EVENTO -->
<div id="crearEvento" class="screen">
  <h1>Crear evento</h1>
  <button onclick="ir('home')">⬅</button>

  <input id="nombreEvento" placeholder="Nombre">
  <input id="venueEvento" placeholder="Venue">

  <button onclick="crearEvento()">Guardar</button>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <h1>Eventos</h1>
  <button onclick="ir('home')">⬅</button>

  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <h1>Gestión</h1>

  <button onclick="ir('eventos')">⬅ Cambiar evento</button>

  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('inc')">⚠️ Incidencias</button>
  <button onclick="ir('upload')">📂 CSV</button>
  <button onclick="ir('accesos')">🚪 Accesos</button>
  <button onclick="ir('asociacion')">🔗 Asociación</button>
</div>

<!-- ACCESOS -->
<div id="accesos" class="screen">
  <h1>Accesos</h1>
  <button onclick="ir('gestion')">⬅</button>

  <input id="nombreAcceso" placeholder="Ej: PISTA">
  <button onclick="crearAcceso()">Crear</button>

  <div id="listaAccesos"></div>
</div>

<!-- ASOCIACION -->
<div id="asociacion" class="screen">
  <h1>Asociación visual</h1>
  <button onclick="ir('gestion')">⬅</button>

  <div id="tabla"></div>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <h1>📊 Estadísticas</h1>
  <button onclick="ir('gestion')">⬅</button>

  <div id="tablaStats"></div>
</div>

<!-- INCIDENCIAS -->
<div id="inc" class="screen">
  <h1>⚠️ Incidencias</h1>
  <button onclick="ir('gestion')">⬅</button>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Zona</th>
        <th>Ticketera</th>
        <th>Usos</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaInc"></tbody>
  </table>
</div>

<!-- CSV -->
<div id="upload" class="screen">
  <h1>Subida CSV</h1>
  <button onclick="ir('gestion')">⬅</button>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir</button>
</div>

<script>
const client = window.supabase.createClient(
 "https://zuhssrhdezptsgemxofh.supabase.co",
 "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent=null;
let currentVenue=null;

function ir(p){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(p).classList.add("active");

 if(p==="eventos") cargarEventos();
 if(p==="accesos") cargarAccesos();
 if(p==="asociacion") cargarMatriz();
 if(p==="stats") cargarStats();
 if(p==="inc") cargarInc();
}

//////////////////////////////////////////////////
// EVENTOS
//////////////////////////////////////////////////

async function crearEvento(){
 const nombre=document.getElementById("nombreEvento").value;
 const venue=document.getElementById("venueEvento").value;

 await client.from("events").insert({
   name:nombre,
   venue:venue,
   status:"active"
 });

 alert("Evento creado");
 ir("eventos");
}

async function cargarEventos(){
 const {data}=await client.from("events").select("*");

 document.getElementById("listaEventos").innerHTML =
 data.map(e=>`
   <div class="card">
     ${e.name}
     <button onclick="entrar('${e.id}','${e.venue}')">Entrar</button>
   </div>
 `).join("");
}

function entrar(id,venue){
 currentEvent=id;
 currentVenue=venue;
 ir("gestion");
}

//////////////////////////////////////////////////
// ACCESOS
//////////////////////////////////////////////////

async function crearAcceso(){
 const nombre=document.getElementById("nombreAcceso").value;

 if(!nombre) return alert("Nombre requerido");

 await client.from("access_points").insert({
   name:nombre,
   venue:currentVenue
 });

 cargarAccesos();
}

async function cargarAccesos(){
 const {data}=await client.from("access_points")
   .select("*")
   .eq("venue",currentVenue);

 document.getElementById("listaAccesos").innerHTML =
 data.map(a=>`<div class="card">${a.name}</div>`).join("");
}

//////////////////////////////////////////////////
// MATRIZ ASOCIACION (ARREGLADA)
//////////////////////////////////////////////////

async function cargarMatriz(){

 const {data:codes}=await client
   .from("codes")
   .select("zone_id, ticket_provider_id, zones(name), ticket_providers(name)")
   .eq("event_id",currentEvent);

 const {data:accesos}=await client
   .from("access_points")
   .select("*")
   .eq("venue",currentVenue);

 const {data:rel}=await client.from("ticket_access").select("*");

 // 🔥 combinaciones únicas zona + ticketera
 const combinaciones={};

 codes.forEach(c=>{
   const key = c.zone_id + "_" + c.ticket_provider_id;

   if(!combinaciones[key]){
     combinaciones[key]={
       zone_id:c.zone_id,
       ticket_provider_id:c.ticket_provider_id,
       zona:c.zones?.name || "Sin zona",
       ticket:c.ticket_providers?.name || "Sin ticketera"
     };
   }
 });

 const lista = Object.values(combinaciones);

 let html="<table><tr><th>Concepto</th>";

 accesos.forEach(a=>{
   html+=`<th>${a.name}</th>`;
 });

 html+="</tr>";

 lista.forEach(item=>{

   const nombre = item.zona + " - " + item.ticket;

   html+=`<tr><td>${nombre}</td>`;

   accesos.forEach(a=>{

     const existe = rel.some(r =>
       r.ticket_provider_id === item.ticket_provider_id &&
       r.access_id === a.id &&
       r.zone_id === item.zone_id
     );

     html+=`
       <td>
         <input type="checkbox"
         ${existe ? "checked" : ""}
         onchange="toggleAcceso('${item.ticket_provider_id}','${a.id}','${item.zone_id}',this.checked)">
       </td>`;
   });

   html+="</tr>";
 });

 html+="</table>";

 document.getElementById("tabla").innerHTML=html;
}

async function toggleAcceso(ticket,access,zona,estado){

 if(estado){
   const {error}=await client.from("ticket_access").insert({
     ticket_provider_id:ticket,
     access_id:access,
     zone_id:zona
   });

   if(error) console.log(error.message);

 }else{
   await client.from("ticket_access")
     .delete()
     .eq("ticket_provider_id",ticket)
     .eq("access_id",access)
     .eq("zone_id",zona);
 }
}

//////////////////////////////////////////////////
// STATS (CORRECTAS)
//////////////////////////////////////////////////

async function cargarStats(){

 const {data}=await client
   .from("codes")
   .select("*, ticket_providers(name)")
   .eq("event_id",currentEvent);

 let total = data.length;
 let usados = 0;
 let pendientes = 0;

 const porTicketera = {};

 data.forEach(c=>{

   if(c.usage_count > 0) usados++;
   else pendientes++;

   const t = c.ticket_providers?.name || "Sin ticketera";

   if(!porTicketera[t]){
     porTicketera[t]=0;
   }

   porTicketera[t]++;
 });

 let html = `
   <h2>Resumen global</h2>
   Total: ${total}<br>
   Usados: ${usados}<br>
   Pendientes: ${pendientes}<br>
   <hr>
   <h2>Por ticketera</h2>
 `;

 for(let t in porTicketera){
   html += `${t}: ${porTicketera[t]} códigos<br>`;
 }

 document.getElementById("tablaStats").innerHTML = html;
}

//////////////////////////////////////////////////
// INCIDENCIAS (CON ACCIONES)
//////////////////////////////////////////////////

async function cargarInc(){

 const {data}=await client
   .from("codes")
   .select("*, zones(name), ticket_providers(name)")
   .eq("event_id",currentEvent);

 document.getElementById("tablaInc").innerHTML =
 data.map(c=>{

   let estado="Pendiente";

   if(c.status==="cancelled") estado="Cancelado";
   else if(c.is_top_code) estado="Multiread";
   else if(c.usage_count>0) estado="Usado";

   return `
   <tr>
     <td>${c.code_value}</td>
     <td>${c.zones?.name||""}</td>
     <td>${c.ticket_providers?.name||""}</td>
     <td>${c.usage_count}</td>
     <td>${estado}</td>
     <td>
       <button onclick="usar('${c.id}')">Usar</button>
       <button onclick="reset('${c.id}')">Reset</button>
       <button onclick="cancelar('${c.id}')">Cancel</button>
       <button onclick="multi('${c.id}')">Multi</button>
     </td>
   </tr>`;
 }).join("");
}

async function usar(id){
 await client.from("codes").update({
   usage_count:1,
   first_entry_at:new Date(),
   first_entry_device_id:"web"
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function reset(id){
 await client.from("codes").update({
   usage_count:0,
   first_entry_at:null,
   first_entry_device_id:null
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function cancelar(id){
 await client.from("codes").update({
   status:"cancelled"
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function multi(id){
 await client.from("codes").update({
   is_top_code:true
 }).eq("id",id);

 alert("Multiread activado");
}

//////////////////////////////////////////////////
// CSV
//////////////////////////////////////////////////

async function subir(){

 const file=document.getElementById("fileInput").files[0];
 if(!file) return alert("Selecciona archivo");

 const text=await file.text();
 const lines=text.split("\n");

 const {data:zonas}=await client.from("zones").select("*");
 const {data:tickets}=await client.from("ticket_providers").select("*");

 const insertar=[];

 for(let i=1;i<lines.length;i++){

   const cols=lines[i].split(";");

   const codigo=cols[0]?.trim();
   const zona=zonas.find(z=>z.name===cols[1]);
   const ticket=tickets.find(t=>t.name===cols[2]);

   if(!codigo||!zona||!ticket) continue;

   insertar.push({
     event_id:currentEvent,
     code_value:codigo,
     status:"valid",
     zone_id:zona.id,
     ticket_provider_id:ticket.id,
     usage_count:0
   });
 }

 await client.from("codes").insert(insertar);

 alert("CSV cargado");
}
</script>

</body>
</html>
