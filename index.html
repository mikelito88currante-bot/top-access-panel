<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="ir('eventos')">Seleccionar evento</button>
    <button>Crear evento</button>
    <button>Usuarios</button>
    <button>Usuarios avanzados</button>
    <button>Configuración recintos</button>
    <button>Configuración zonas</button>
    <button>Configuración dispositivos</button>
  </div>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>
  <h2>Eventos</h2>
  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('incidencias')">⚠️ Incidencias</button>
  <button onclick="ir('upload')">📂 Cargar CSV</button>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>
  <h2>Estadísticas</h2>
  <div id="statsContent"></div>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>

  <h2>Incidencias</h2>

  <input id="buscar" placeholder="Buscar..." oninput="filtrar()">
  <ul id="listaCodigos"></ul>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>

  <h2>Subir CSV</h2>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir</button>

  <div id="resultado"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aHNzcmhkZXpwdHNnZW14b2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzE5MjcsImV4cCI6MjA4NTk0NzkyN30.Tb0y2zGuy3hGRimE5SY4zHIY8FMfgYt9uDofVQeKBX0"
);

let currentEvent = null;
let codigos = [];

// NAVEGACIÓN
function ir(pantalla) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(pantalla).classList.add("active");

  if (pantalla === "eventos") cargarEventos();
  if (pantalla === "stats") cargarStats();
  if (pantalla === "incidencias") cargarIncidencias();
}

// EVENTOS
async function cargarEventos() {
  const { data, error } = await client.from("events").select("*");

  const cont = document.getElementById("listaEventos");
  cont.innerHTML = "";

  if (error) {
    cont.innerHTML = "Error cargando eventos";
    return;
  }

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      ${e.venue || ""}<br>
      <button onclick="entrar('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function entrar(id) {
  currentEvent = id;
  ir("gestion");
}

// STATS
async function cargarStats() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  document.getElementById("statsContent").innerText =
    "Total códigos: " + (data?.length || 0);
}

// INCIDENCIAS
async function cargarIncidencias() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  codigos = data;
  pintar(data);
}

function filtrar() {
  const txt = document.getElementById("buscar").value.toLowerCase();

  const filtrados = codigos.filter(c =>
    c.code_value.toLowerCase().includes(txt)
  );

  pintar(filtrados);
}

function pintar(lista) {
  const ul = document.getElementById("listaCodigos");
  ul.innerHTML = "";

  lista.forEach(c => {
    const li = document.createElement("li");
    li.textContent = c.code_value + " - " + c.status;
    ul.appendChild(li);
  });
}

// UPLOAD
async function subir() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) return alert("Selecciona archivo");

  const text = await file.text();
  const lines = text.split("\n");

  let nuevos = 0;

  const insertar = [];

  for (let i = 1; i < lines.length; i++) {
    const codigo = lines[i].split(",")[0]?.trim();
    if (!codigo) continue;

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid"
    });

    nuevos++;
  }

  if (insertar.length > 0) {
    await client.from("codes").insert(insertar);
  }

  document.getElementById("resultado").innerText =
    "Códigos insertados: " + nuevos;
}
</script>

</body>
</html>
