<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    button {
      padding: 12px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="ir('eventos')">Seleccionar evento</button>
</div>

<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>
  <div id="listaEventos"></div>
</div>

<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅ Volver</button>
  <h2>Gestión</h2>
  <button onclick="ir('upload')">📂 Cargar CSV</button>
</div>

<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>

  <h2>Subir CSV</h2>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir</button>

  <div id="resultado"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ir(p) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if (p === "eventos") cargarEventos();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("listaEventos");
  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      <button onclick="seleccionar('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function seleccionar(id) {
  currentEvent = id;
  ir("gestion");
}

// 🔥 SUBIDA INTELIGENTE
async function subir() {

  if (!currentEvent) {
    alert("Selecciona evento primero");
    return;
  }

  // 🔥 1. BUSCAR ZONA DEL EVENTO
  const { data: zonas } = await client
    .from("zones")
    .select("*")
    .eq("event_id", currentEvent);

  if (!zonas || zonas.length === 0) {
    alert("Este evento no tiene zonas creadas");
    return;
  }

  const zona = zonas[0].id; // usa la primera zona

  // 🔥 2. LEER CSV
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Selecciona archivo");
    return;
  }

  const text = await file.text();
  const lines = text.split("\n");

  const insertar = [];

  for (let i = 1; i < lines.length; i++) {

    const codigo = lines[i].split(",")[0]?.trim();
    if (!codigo) continue;

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid",
      usage_count: 0,
      zone_id: zona // 🔥 zona correcta del evento
    });
  }

  const { data, error } = await client
    .from("codes")
    .insert(insertar)
    .select();

  if (error) {
    alert("ERROR: " + error.message);
    console.error(error);
    return;
  }

  alert("Insertados: " + data.length);

  document.getElementById("resultado").innerText =
    "Insertados correctamente: " + data.length;
}
</script>

</body>
</html>
