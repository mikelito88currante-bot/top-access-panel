<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .evento {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .back {
      margin-bottom: 20px;
      background: #334155;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="mostrar('listaEventos')">Seleccionar evento</button>
  </div>
</div>

<!-- EVENTOS -->
<div id="listaEventos" class="screen">
  <button class="back" onclick="mostrar('home')">⬅ Volver</button>
  <h2>Eventos</h2>
  <div id="contenedorEventos">Cargando...</div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aHNzcmhkZXpwdHNnZW14b2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzE5MjcsImV4cCI6MjA4NTk0NzkyN30.Tb0y2zGuy3hGRimE5SY4zHIY8FMfgYt9uDofVQeKBX0"
);

function mostrar(id) {
  document.querySelectorAll(".screen").forEach(d => d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "listaEventos") cargarEventos();
}

async function cargarEventos() {
  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "Cargando...";

  const { data, error } = await client.from("events").select("*");

  console.log("EVENTOS:", data, error);

  if (error) {
    cont.innerHTML = "Error: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    cont.innerHTML = "No hay eventos";
    return;
  }

  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "evento";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      ${e.venue || ""}<br>
      ${e.event_date || ""}<br><br>
      <button>Entrar</button>
    `;

    cont.appendChild(div);
  });
}
</script>

</body>
</html>
