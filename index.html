<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    .evento {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      background: #1e293b;
      border-radius: 10px;
      margin-top: 20px;
    }

    td, th {
      padding: 10px;
      text-align: center;
    }

    .back {
      margin-bottom: 20px;
      background: #334155;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="irSeleccionar()">Seleccionar evento</button>
    <button>Crear evento</button>
    <button>Usuarios</button>
    <button>Usuarios avanzados</button>
    <button>Configuración recintos</button>
    <button>Configuración zonas</button>
    <button>Configuración dispositivos</button>
  </div>
</div>

<!-- LISTA EVENTOS -->
<div id="listaEventos" class="hidden">
  <button class="back" onclick="volverInicio()">⬅ Volver</button>
  <h2>Eventos</h2>
  <div id="contenedorEventos"></div>
</div>

<!-- GESTION EVENTO -->
<div id="gestionarEvento" class="hidden">
  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="irEstadisticas()">📊 Estadísticas</button>
  <button>⚠️ Incidencias</button>
  <button>🎯 Asociación visual</button>
  <button>📂 Cargar códigos</button>
</div>

<!-- ESTADISTICAS -->
<div id="estadisticas" class="hidden">
  <button class="back" onclick="volverGestion()">⬅ Volver</button>

  <h2>📊 Estadísticas</h2>

  <table>
    <thead>
      <tr>
        <th>Zona</th>
        <th>Ticketera</th>
        <th>Pendientes</th>
        <th>Usadas</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tablaStats"></tbody>
  </table>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ocultarTodo() {
  document.querySelectorAll("div").forEach(d => d.classList.add("hidden"));
}

function volverInicio() {
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function volverGestion() {
  ocultarTodo();
  document.getElementById("gestionarEvento").classList.remove("hidden");
}

function irSeleccionar() {
  ocultarTodo();
  document.getElementById("listaEventos").classList.remove("hidden");
  cargarEventos();
}

function irEstadisticas() {
  ocultarTodo();
  document.getElementById("estadisticas").classList.remove("hidden");
  cargarEstadisticas();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "";

  data.forEach(e => {

    const div = document.createElement("div");
    div.className = "evento";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      📍 ${e.venue || "-"}<br>
      📅 ${e.event_date || "-"}<br>
      👥 Aforo: ${e.capacity_current || 0}

      <br><br>
      <button onclick="entrarEvento('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function entrarEvento(id) {
  currentEvent = id;
  ocultarTodo();
  document.getElementById("gestionarEvento").classList.remove("hidden");
}

// ESTADISTICAS
async function cargarEstadisticas() {

  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  const resumen = {};

  data.forEach(c => {

    const zona = c.zone_id || "Sin zona";
    const ticket = c.ticket_provider_id || "Sin ticketera";

    const key = zona + "_" + ticket;

    if (!resumen[key]) {
      resumen[key] = {
        zona,
        ticket,
        usadas: 0,
        pendientes: 0
      };
    }

    if (c.status === "used") {
      resumen[key].usadas++;
    } else {
      resumen[key].pendientes++;
    }
  });

  const tbody = document.getElementById("tablaStats");
  tbody.innerHTML = "";

  Object.values(resumen).forEach(r => {

    const total = r.usadas + r.pendientes;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.zona}</td>
      <td>${r.ticket}</td>
      <td>${r.pendientes}</td>
      <td>${r.usadas}</td>
      <td>${total}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
