<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .evento {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .back {
      margin-bottom: 20px;
      background: #334155;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="mostrar('listaEventos')">Seleccionar evento</button>
    <button>Crear evento</button>
    <button>Usuarios</button>
    <button>Usuarios avanzados</button>
    <button>Configuración recintos</button>
    <button>Configuración zonas</button>
    <button>Configuración dispositivos</button>
  </div>
</div>

<!-- EVENTOS -->
<div id="listaEventos" class="screen">
  <button class="back" onclick="mostrar('home')">⬅ Volver</button>
  <h2>Eventos</h2>
  <div id="contenedorEventos">Cargando...</div>
</div>

<!-- GESTION -->
<div id="gestionarEvento" class="screen">
  <button class="back" onclick="mostrar('listaEventos')">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="mostrar('estadisticas')">📊 Estadísticas</button>
</div>

<!-- ESTADISTICAS -->
<div id="estadisticas" class="screen">
  <button class="back" onclick="mostrar('gestionarEvento')">⬅ Volver</button>

  <h2>📊 Estadísticas</h2>

  <div id="stats">Cargando...</div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// CAMBIO DE PANTALLA (SOLUCIÓN REAL)
function mostrar(id) {
  document.querySelectorAll(".screen").forEach(d => d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "listaEventos") cargarEventos();
  if (id === "estadisticas") cargarEstadisticas();
}

// EVENTOS
async function cargarEventos() {
  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "Cargando...";

  const { data, error } = await client.from("events").select("*");

  console.log("EVENTOS:", data, error);

  if (error) {
    cont.innerHTML = "Error cargando eventos";
    return;
  }

  if (!data || data.length === 0) {
    cont.innerHTML = "⚠️ No hay eventos (revisar RLS)";
    return;
  }

  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");
    div.className = "evento";

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      ${e.venue || ""}<br>
      ${e.event_date || ""}

      <br><br>
      <button onclick="seleccionarEvento('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function seleccionarEvento(id) {
  currentEvent = id;
  mostrar("gestionarEvento");
}

// STATS
async function cargarEstadisticas() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  document.getElementById("stats").innerText =
    "Códigos totales: " + (data?.length || 0);
}
</script>

</body>
</html>
