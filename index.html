<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    .evento {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
    }

    .back {
      margin-bottom: 20px;
      background: #334155;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="irSeleccionar()">Seleccionar evento</button>
    <button onclick="irCrearEvento()">Crear evento</button>
    <button>Usuarios</button>
    <button>Usuarios avanzados</button>
    <button>Configuración recintos</button>
    <button>Configuración zonas</button>
    <button>Configuración dispositivos</button>
  </div>
</div>

<!-- LISTA EVENTOS -->
<div id="listaEventos" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h2>Eventos</h2>

  <div id="contenedorEventos"></div>

</div>

<!-- GESTION EVENTO -->
<div id="gestionarEvento" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button>📊 Estadísticas</button>
  <button>⚠️ Incidencias</button>
  <button>🎯 Asociación visual</button>
  <button>📂 Cargar códigos</button>

</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ocultarTodo() {
  document.querySelectorAll("div").forEach(d => d.classList.add("hidden"));
}

function volverInicio() {
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function irSeleccionar() {
  ocultarTodo();
  document.getElementById("listaEventos").classList.remove("hidden");
  cargarEventos();
}

// CARGAR EVENTOS (VERSIÓN PRO)
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "";

  data.forEach(e => {

    const div = document.createElement("div");
    div.className = "evento";

    div.innerHTML = `
      <strong>${e.name}</strong>

      <div class="row">📍 ${e.venue || "-"}</div>
      <div class="row">📅 ${e.event_date || "-"}</div>
      <div class="row">👥 Aforo: ${e.capacity_current || 0}</div>

      <div class="row">
        <button onclick="entrarEvento('${e.id}')">Entrar</button>
        <button onclick="toggleEvento('${e.id}', ${e.is_active})">
          ${e.is_active ? "Desactivar" : "Activar"}
        </button>
      </div>
    `;

    cont.appendChild(div);
  });
}

// ACTIVAR / DESACTIVAR
async function toggleEvento(id, estado) {
  await client
    .from("events")
    .update({ is_active: !estado })
    .eq("id", id);

  cargarEventos();
}

// ENTRAR EVENTO
function entrarEvento(id) {
  currentEvent = id;
  ocultarTodo();
  document.getElementById("gestionarEvento").classList.remove("hidden");
}
</script>

</body>
</html>
