<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    .screen { display: none; }
    .active { display: block; }

    h1 { margin-bottom: 20px; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🏠 Inicio</h1>

  <button onclick="ir('eventos')">Seleccionar evento</button>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <h1>📅 Eventos</h1>
  <button onclick="ir('home')">⬅ Volver</button>

  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <h1>⚙️ Gestión del evento</h1>

  <button onclick="ir('eventos')">⬅ Volver</button>

  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('incidencias')">⚠️ Incidencias</button>
  <button onclick="ir('upload')">📂 Subir CSV</button>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <h1>📊 Estadísticas</h1>
  <button onclick="ir('gestion')">⬅ Volver</button>

  <div id="statsContent"></div>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="screen">
  <h1>⚠️ Incidencias</h1>
  <button onclick="ir('gestion')">⬅ Volver</button>

  <ul id="listaCodigos"></ul>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <h1>📂 Subida de CSV</h1>
  <button onclick="ir('gestion')">⬅ Volver</button>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir CSV</button>

  <div id="resumen"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ir(p){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if(p==="eventos") cargarEventos();
  if(p==="stats") cargarStats();
  if(p==="incidencias") cargarIncidencias();
}

// EVENTOS
async function cargarEventos(){
  const {data}=await client.from("events").select("*");

  document.getElementById("listaEventos").innerHTML =
    data.map(e=>`<div class="card">${e.name}
      <button onclick="entrar('${e.id}')">Entrar</button>
    </div>`).join("");
}

function entrar(id){
  currentEvent = id;
  ir("gestion");
}

// STATS
async function cargarStats(){
  const {data}=await client
    .from("codes")
    .select("*")
    .eq("event_id",currentEvent);

  document.getElementById("statsContent").innerText =
    "Total códigos: " + (data?.length || 0);
}

// INCIDENCIAS
async function cargarIncidencias(){
  const {data}=await client
    .from("codes")
    .select("*")
    .eq("event_id",currentEvent);

  document.getElementById("listaCodigos").innerHTML =
    data.map(c=>`<li>${c.code_value}</li>`).join("");
}

// 🚀 CSV CORRECTO
async function subir(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Selecciona archivo");

  const text = await file.text();
  const lines = text.split("\n");

  const {data:zonas} = await client.from("zones").select("*");
  const {data:tickets} = await client.from("ticket_providers").select("*");

  const insertar = [];
  const resumen = {};

  for(let i=1;i<lines.length;i++){

    const cols = lines[i].split(";"); // 🔥 CORREGIDO

    const codigo = cols[0]?.trim();
    const nombreZona = cols[1]?.trim();
    const nombreTicket = cols[2]?.trim();

    if(!codigo) continue;

    const zona = zonas.find(z => z.name.toLowerCase() === nombreZona?.toLowerCase());
    const ticket = tickets.find(t => t.name.toLowerCase() === nombreTicket?.toLowerCase());

    if(!zona || !ticket){
      console.warn("No encontrado:", nombreZona, nombreTicket);
      continue;
    }

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid",
      zone_id: zona.id,
      ticket_provider_id: ticket.id,
      usage_count: 0
    });

    resumen[nombreTicket] = (resumen[nombreTicket] || 0) + 1;
  }

  const {error} = await client.from("codes").insert(insertar);

  if(error){
    alert(error.message);
    return;
  }

  // 🔥 RESUMEN VISUAL
  let html = `<div class="card">Total: ${insertar.length}</div>`;

  for(let t in resumen){
    html += `<div class="card">${t}: ${resumen[t]} códigos</div>`;
  }

  document.getElementById("resumen").innerHTML = html;

  alert("CSV cargado correctamente");
}
</script>

</body>
</html>
