<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    .screen { display: none; }
    .active { display: block; }

    button { padding: 10px; margin: 5px; border-radius: 8px; border: none; background: #1e293b; color: white; cursor: pointer; }
    input { padding: 10px; margin: 5px; border-radius: 8px; border: none; }

    .card { background: #1e293b; padding: 10px; margin: 5px; border-radius: 8px; }
  </style>
</head>

<body>

<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>

  <button onclick="ir('crearEvento')">Crear evento</button>
  <button onclick="ir('eventos')">Seleccionar evento</button>
  <button onclick="ir('zonas')">Zonas</button>
  <button onclick="ir('ticketeras')">Ticketeras</button>
</div>

<!-- TICKETERAS -->
<div id="ticketeras" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>

  <h2>Crear ticketera</h2>
  <input id="ticketNombre" placeholder="Nombre ticketera">
  <button onclick="crearTicketera()">Crear</button>

  <div id="listaTicket"></div>
</div>

<!-- ZONAS -->
<div id="zonas" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>

  <input id="zonaNombre" placeholder="Nombre zona">
  <button onclick="crearZona()">Crear</button>

  <div id="listaZonas"></div>
</div>

<!-- CREAR EVENTO -->
<div id="crearEvento" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>

  <input id="eventoNombre" placeholder="Nombre evento">
  <input id="eventoLugar" placeholder="Lugar">

  <h3>Zonas</h3>
  <div id="zonasSeleccion"></div>

  <h3>Ticketeras</h3>
  <div id="ticketSeleccion"></div>

  <button onclick="guardarEvento()">Guardar</button>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>
  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅ Volver</button>

  <button onclick="ir('upload')">Subir CSV</button>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>

  <h3>Zona</h3>
  <select id="selectZona"></select>

  <h3>Ticketera</h3>
  <select id="selectTicket"></select>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir</button>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ir(p){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if(p==="zonas") cargarZonas();
  if(p==="ticketeras") cargarTicketeras();
  if(p==="crearEvento"){ cargarZonasSel(); cargarTicketSel(); }
  if(p==="eventos") cargarEventos();
  if(p==="upload") cargarSelects();
}

// ZONAS
async function crearZona(){
  const n=document.getElementById("zonaNombre").value;
  await client.from("zones").insert({name:n});
  cargarZonas();
}
async function cargarZonas(){
  const {data}=await client.from("zones").select("*");
  document.getElementById("listaZonas").innerHTML=data.map(z=>`<div class="card">${z.name}</div>`).join("");
}

// TICKETERAS
async function crearTicketera(){
  const n=document.getElementById("ticketNombre").value;
  await client.from("ticket_providers").insert({name:n});
  cargarTicketeras();
}
async function cargarTicketeras(){
  const {data}=await client.from("ticket_providers").select("*");
  document.getElementById("listaTicket").innerHTML=data.map(t=>`<div class="card">${t.name}</div>`).join("");
}

// SELECTORES
async function cargarZonasSel(){
  const {data}=await client.from("zones").select("*");
  document.getElementById("zonasSeleccion").innerHTML=data.map(z=>`<input type="checkbox" value="${z.id}">${z.name}<br>`).join("");
}
async function cargarTicketSel(){
  const {data}=await client.from("ticket_providers").select("*");
  document.getElementById("ticketSeleccion").innerHTML=data.map(t=>`<input type="checkbox" value="${t.id}">${t.name}<br>`).join("");
}

// CREAR EVENTO
async function guardarEvento(){
  const name=document.getElementById("eventoNombre").value;
  const venue=document.getElementById("eventoLugar").value;

  const {data}=await client.from("events").insert({name,venue,status:"active"}).select();
  const eventId=data[0].id;

  document.querySelectorAll("#zonasSeleccion input:checked").forEach(async c=>{
    await client.from("event_zones").insert({event_id:eventId,zone_id:c.value});
  });

  document.querySelectorAll("#ticketSeleccion input:checked").forEach(async c=>{
    await client.from("event_ticket_providers").insert({event_id:eventId,ticket_provider_id:c.value});
  });

  alert("Evento creado");
  ir("home");
}

// EVENTOS
async function cargarEventos(){
  const {data}=await client.from("events").select("*");
  document.getElementById("listaEventos").innerHTML=data.map(e=>`<div class="card">${e.name}<button onclick="entrar('${e.id}')">Entrar</button></div>`).join("");
}
function entrar(id){ currentEvent=id; ir("gestion"); }

// SELECTS UPLOAD
async function cargarSelects(){

  const {data:zonas}=await client.from("event_zones").select("zone_id").eq("event_id",currentEvent);
  const {data:allZ}=await client.from("zones").select("*");

  const selectZ=document.getElementById("selectZona");
  selectZ.innerHTML="";
  zonas.forEach(z=>{
    const zona=allZ.find(a=>a.id===z.zone_id);
    selectZ.innerHTML+=`<option value="${zona.id}">${zona.name}</option>`;
  });

  const {data:tickets}=await client.from("event_ticket_providers").select("ticket_provider_id").eq("event_id",currentEvent);
  const {data:allT}=await client.from("ticket_providers").select("*");

  const selectT=document.getElementById("selectTicket");
  selectT.innerHTML="";
  tickets.forEach(t=>{
    const tk=allT.find(a=>a.id===t.ticket_provider_id);
    selectT.innerHTML+=`<option value="${tk.id}">${tk.name}</option>`;
  });
}

// SUBIR CSV
async function subir(){

  const zona=document.getElementById("selectZona").value;
  const ticket=document.getElementById("selectTicket").value;

  const file=document.getElementById("fileInput").files[0];
  const text=await file.text();
  const lines=text.split("\n");

  const insertar=[];

  for(let i=1;i<lines.length;i++){
    const codigo=lines[i].split(",")[0]?.trim();
    if(!codigo) continue;

    insertar.push({
      event_id:currentEvent,
      code_value:codigo,
      status:"valid",
      zone_id:zona,
      ticket_provider_id:ticket,
      usage_count:0
    });
  }

  const {error}=await client.from("codes").insert(insertar);

  if(error){ alert(error.message); return; }

  alert("Cargado correctamente");
}
</script>

</body>
</html>
