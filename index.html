<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="ir('eventos')">Seleccionar evento</button>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>
  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅ Volver</button>

  <h2>Gestión</h2>

  <button onclick="ir('upload')">📂 Subir CSV</button>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅ Volver</button>

  <h2>Subir códigos</h2>

  <input type="file" id="fileInput">
  <br>
  <button onclick="subir()">Subir archivo</button>

  <div id="resultado"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aHNzcmhkZXpwdHNnZW14b2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzE5MjcsImV4cCI6MjA4NTk0NzkyN30.Tb0y2zGuy3hGRimE5SY4zHIY8FMfgYt9uDofVQeKBX0"
);

let currentEvent = null;

// NAVEGACIÓN
function ir(p) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if (p === "eventos") cargarEventos();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("listaEventos");
  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");

    div.innerHTML = `
      <strong>${e.name}</strong>
      <button onclick="seleccionar('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function seleccionar(id) {
  currentEvent = id;
  ir("gestion");
}

// 🔥 SUBIDA REAL (CORREGIDA)
async function subir() {

  if (!currentEvent) {
    alert("Selecciona un evento primero");
    return;
  }

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Selecciona un archivo");
    return;
  }

  const text = await file.text();
  const lines = text.split("\n");

  const insertar = [];

  for (let i = 1; i < lines.length; i++) {
    const codigo = lines[i].split(",")[0]?.trim();

    if (!codigo) continue;

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid",
      usage_count: 0
    });
  }

  console.log("DATOS A INSERTAR:", insertar);

  const { data, error } = await client
    .from("codes")
    .insert(insertar)
    .select();

  console.log("RESPUESTA:", data, error);

  if (error) {
    alert("ERROR: " + error.message);
    return;
  }

  alert("Códigos insertados: " + data.length);

  document.getElementById("resultado").innerText =
    "Insertados correctamente: " + data.length;
}
</script>

</body>
</html>
