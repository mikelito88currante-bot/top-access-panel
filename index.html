<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
    .screen{display:none;} .active{display:block;}
    button{padding:10px;margin:5px;border:none;border-radius:8px;background:#1e293b;color:white;}
    .card{background:#1e293b;padding:10px;margin:5px;border-radius:8px;}
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🏠 Inicio</h1>
  <button onclick="ir('crearEvento')">Crear evento</button>
  <button onclick="ir('eventos')">Seleccionar evento</button>
  <button onclick="ir('grupos')">Grupo de tornos</button>
</div>

<!-- GRUPOS -->
<div id="grupos" class="screen">
  <h1>🎛️ Grupo de tornos</h1>
  <button onclick="ir('home')">⬅</button>

  <input id="nombreGrupo" placeholder="Nombre (PISTA)">
  <input id="cantidadGrupo" placeholder="Cantidad">

  <button onclick="crearGrupo()">Crear</button>

  <div id="listaGrupos"></div>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <h1>Eventos</h1>
  <button onclick="ir('home')">⬅</button>
  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <h1>Gestión</h1>

  <button onclick="ir('eventos')">Cambiar evento</button>

  <button onclick="ir('asociacion')">🔗 Asociación accesos</button>
  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('inc')">⚠️ Incidencias</button>
</div>

<!-- ASOCIACION -->
<div id="asociacion" class="screen">
  <h1>🔗 Asociación ticketera → zona</h1>
  <button onclick="ir('gestion')">⬅</button>

  <div id="tablaAsociacion"></div>
</div>

<script>
const client = window.supabase.createClient(
 "https://zuhssrhdezptsgemxofh.supabase.co",
 "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent=null;

function ir(p){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(p).classList.add("active");

 if(p==="eventos") cargarEventos();
 if(p==="asociacion") cargarAsociacion();
 if(p==="grupos") cargarGrupos();
}

//////////////////////////////////////////////////
// EVENTOS
//////////////////////////////////////////////////

async function cargarEventos(){
 const {data}=await client.from("events").select("*");

 document.getElementById("listaEventos").innerHTML =
 data.map(e=>`<div class="card">${e.name}
   <button onclick="entrar('${e.id}')">Entrar</button>
 </div>`).join("");
}

function entrar(id){
 currentEvent=id;
 ir("gestion");
}

//////////////////////////////////////////////////
// 🔗 ASOCIACION
//////////////////////////////////////////////////

async function cargarAsociacion(){

 const {data:zonas}=await client.from("zones").select("*");
 const {data:tickets}=await client.from("ticket_providers").select("*");
 const {data:rel}=await client.from("ticket_zone_access").select("*");

 let html="";

 tickets.forEach(t=>{

   html+=`<div class="card"><b>${t.name}</b><br>`;

   zonas.forEach(z=>{

     const existe = rel.find(r=>r.ticket_provider_id===t.id && r.zone_id===z.id);

     html+=`
       <label>
         <input type="checkbox"
           ${existe?"checked":""}
           onchange="toggle('${t.id}','${z.id}',this.checked)">
         ${z.name}
       </label><br>
     `;
   });

   html+="</div>";
 });

 document.getElementById("tablaAsociacion").innerHTML=html;
}

async function toggle(ticket, zona, estado){

 if(estado){
   await client.from("ticket_zone_access").insert({
     ticket_provider_id:ticket,
     zone_id:zona
   });
 }else{
   await client.from("ticket_zone_access")
     .delete()
     .eq("ticket_provider_id",ticket)
     .eq("zone_id",zona);
 }
}

//////////////////////////////////////////////////
// 🎛️ GRUPOS DE TORNOS
//////////////////////////////////////////////////

async function crearGrupo(){

 const nombre=document.getElementById("nombreGrupo").value;
 const cantidad=parseInt(document.getElementById("cantidadGrupo").value);

 if(!nombre||!cantidad) return alert("Datos incompletos");

 await client.from("device_groups").insert({
   event_id:currentEvent,
   name:nombre,
   quantity:cantidad
 });

 // crear dispositivos
 for(let i=1;i<=cantidad;i++){
   await client.from("devices").insert({
     event_id:currentEvent,
     name: nombre+" "+i,
     group_name:nombre
   });
 }

 alert("Grupo creado");
 cargarGrupos();
}

async function cargarGrupos(){

 const {data}=await client.from("device_groups").select("*");

 document.getElementById("listaGrupos").innerHTML =
 data.map(g=>`<div class="card">${g.name} (${g.quantity})</div>`).join("");
}

</script>

</body>
</html>
