<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    .screen { display: none; }
    .active { display: block; }
    button { padding: 10px; margin: 5px; border-radius: 8px; border: none; background: #1e293b; color: white; cursor: pointer; }
    input { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
    .card { background: #1e293b; padding: 10px; margin: 5px; border-radius: 8px; }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>

  <button onclick="ir('crearEvento')">Crear evento</button>
  <button onclick="ir('eventos')">Seleccionar evento</button>
  <button onclick="ir('zonas')">Zonas</button>
  <button onclick="ir('ticketeras')">Ticketeras</button>
</div>

<!-- EVENTOS -->
<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅</button>
  <div id="listaEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅</button>

  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('incidencias')">⚠️ Incidencias</button>
  <button onclick="ir('upload')">📂 Subir CSV</button>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <button onclick="ir('gestion')">⬅</button>
  <div id="statsContent"></div>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="screen">
  <button onclick="ir('gestion')">⬅</button>
  <ul id="listaCodigos"></ul>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅</button>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir CSV</button>

  <div id="resumen"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent=null;

// NAV
function ir(p){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if(p==="eventos") cargarEventos();
  if(p==="stats") cargarStats();
  if(p==="incidencias") cargarIncidencias();
}

// EVENTOS
async function cargarEventos(){
  const {data}=await client.from("events").select("*");

  document.getElementById("listaEventos").innerHTML=
    data.map(e=>`<div class="card">${e.name}<button onclick="entrar('${e.id}')">Entrar</button></div>`).join("");
}

function entrar(id){
  currentEvent=id;
  ir("gestion");
}

// STATS
async function cargarStats(){
  const {data}=await client.from("codes").select("*").eq("event_id",currentEvent);
  document.getElementById("statsContent").innerText="Total códigos: "+(data?.length||0);
}

// INCIDENCIAS
async function cargarIncidencias(){
  const {data}=await client.from("codes").select("*").eq("event_id",currentEvent);

  document.getElementById("listaCodigos").innerHTML=
    data.map(c=>`<li>${c.code_value}</li>`).join("");
}

// 🚀 SUBIDA CSV CORREGIDA
async function subir(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Selecciona archivo");

  // 🔹 obtener zona válida
  const {data:zonas}=await client
    .from("event_zones")
    .select("*")
    .eq("event_id",currentEvent);

  if(!zonas.length){
    alert("Evento sin zonas");
    return;
  }

  const zona=zonas[0].zone_id;

  // 🔹 obtener ticketera válida
  const {data:tickets}=await client.from("ticket_providers").select("*");
  if(!tickets.length){
    alert("No hay ticketeras");
    return;
  }

  const ticket=tickets[0].id;

  const text=await file.text();
  const lines=text.split("\n");

  const insertar=[];
  const conteo={};

  for(let i=1;i<lines.length;i++){
    const codigo=lines[i].split(",")[0]?.trim();
    if(!codigo) continue;

    insertar.push({
      event_id:currentEvent,
      code_value:codigo,
      status:"valid",
      zone_id:zona,
      ticket_provider_id:ticket,
      usage_count:0
    });

    // conteo por ticketera
    conteo[ticket]=(conteo[ticket]||0)+1;
  }

  console.log("INSERTAR:", insertar);

  const {error}=await client.from("codes").insert(insertar);

  if(error){
    alert("Error: "+error.message);
    return;
  }

  // 🔥 resumen visual
  document.getElementById("resumen").innerHTML =
    `<div class="card">Códigos cargados: ${insertar.length}</div>
     <div class="card">Ticketera usada: ${ticket}</div>`;

  alert("CSV cargado correctamente");

  // refrescar datos
  cargarStats();
  cargarIncidencias();
}
</script>

</body>
</html>
