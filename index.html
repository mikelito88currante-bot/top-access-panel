async function crearEvento(){

async function cargarEventos(){

 const {data,error}=await client.from("events").select("*");

 if(error){
   console.log(error);
   alert("Error cargando eventos");
   return;
 }

 eventosGlobal = data || [];

 // 🔥 ORDENAR POR FECHA (más recientes primero)
 eventosGlobal.sort((a,b)=> 
   new Date(b.event_date || 0) - new Date(a.event_date || 0)
 );

 // 🔥 SIEMPRE mostrar todos al entrar
 renderEventos(eventosGlobal);
}

function renderEventos(lista){

 if(!lista || lista.length === 0){
   document.getElementById("listaEventos").innerHTML = "No hay eventos";
   return;
 }

 document.getElementById("listaEventos").innerHTML =
 lista.map(e=>`
   <div class="card">
     <b>${e.name}</b><br>
     📍 ${e.venue || ""}<br>
     📅 ${e.event_date || "Sin fecha"}<br>
     <br>
     <button onclick="entrar('${e.id}','${e.venue}')">Entrar</button>
   </div>
 `).join("");
}

function filtrarEventos(){

 const texto = document.getElementById("busquedaEvento").value.toLowerCase();
 const inicio = document.getElementById("fechaInicio").value;
 const fin = document.getElementById("fechaFin").value;

 let filtrados = eventosGlobal;

 // 🔍 FILTRO TEXTO
 if(texto){
   filtrados = filtrados.filter(e =>
     (e.name || "").toLowerCase().includes(texto)
   );
 }

 // 📅 FILTRO FECHA DESDE
 if(inicio){
   filtrados = filtrados.filter(e =>
     e.event_date && e.event_date >= inicio
   );
 }

 // 📅 FILTRO FECHA HASTA
 if(fin){
   filtrados = filtrados.filter(e =>
     e.event_date && e.event_date <= fin
   );
 }

 renderEventos(filtrados);
}

async function cargarMatriz(){

 const {data:codes}=await client.from("codes")
 .select("zone_id,ticket_provider_id,zones(name),ticket_providers(name)")
 .eq("event_id",currentEvent);

 const {data:acc}=await client.from("access_points").select("*").eq("venue",currentVenue);
 const {data:rel}=await client.from("ticket_zone_access").select("*");

 const combos={};
 codes.forEach(c=>{
  const k=c.zone_id+"_"+c.ticket_provider_id;
  combos[k]=c;
 });

 let html="<table><tr><th>Concepto</th>";
 acc.forEach(a=>html+=`<th>${a.name}</th>`);
 html+="</tr>";

 Object.values(combos).forEach(c=>{
  html+=`<tr><td>${c.zones?.name} - ${c.ticket_providers?.name}</td>`;

  acc.forEach(a=>{
   const ok=rel.some(r=>r.zone_id===c.zone_id && r.ticket_provider_id===c.ticket_provider_id && r.access_id===a.id);
   html+=`<td><input type="checkbox" ${ok?"checked":""}
   onchange="toggleAcceso('${c.zone_id}','${c.ticket_provider_id}','${a.id}',this.checked)"></td>`;
  });

  html+="</tr>";
 });

 html+="</table>";
 document.getElementById("tabla").innerHTML=html;
}

async function toggleAcceso(z,t,a,e){
 if(e){
   await client.from("ticket_zone_access").insert({
     zone_id:z,ticket_provider_id:t,access_id:a
   });
 }else{
   await client.from("ticket_zone_access")
   .delete()
   .eq("zone_id",z)
   .eq("ticket_provider_id",t)
   .eq("access_id",a);
 }
}

let chartZonas=null;
let chartTicket=null;
let chartFlujo=null; // 🔥 NUEVO

async function cargarStats(){

 const {data,error}=await client.from("codes")
   .select("*,zones(name),ticket_providers(name)")
   .eq("event_id",currentEvent);

 if(error || !data){
   document.getElementById("tablaStats").innerHTML = "Error cargando stats";
   return;
 }

 let total=0, usados=0, pendientes=0;

 const combo={};       
 const porTicket={};   
 const porZona={};     
 const flujo={}; // 🔥 NUEVO

 data.forEach(c=>{

   total++;

   const zona=c.zones?.name || "Sin zona";
   const ticket=c.ticket_providers?.name || "Sin ticketera";
   const key = ticket + " " + zona;

   const usado = c.usage_count>0;

   if(usado) usados++;
   else pendientes++;

   // 🔹 COMBINADO
   if(!combo[key]) combo[key]={used:0,pend:0,total:0};
   combo[key].total++;
   usado ? combo[key].used++ : combo[key].pend++;

   // 🔹 POR TICKETERA
   if(!porTicket[ticket]) porTicket[ticket]={used:0,pend:0,total:0};
   porTicket[ticket].total++;
   usado ? porTicket[ticket].used++ : porTicket[ticket].pend++;

   // 🔹 POR ZONA
   if(!porZona[zona]) porZona[zona]={used:0,pend:0,total:0};
   porZona[zona].total++;
   usado ? porZona[zona].used++ : porZona[zona].pend++;

   // 🔥 FLUJO 20 MIN
   if(c.first_entry_at){
     const fecha = new Date(c.first_entry_at);

     const minutos = Math.floor(fecha.getMinutes()/20)*20;
     const keyTiempo = `${fecha.getHours()}:${minutos.toString().padStart(2,"0")}`;

     if(!flujo[keyTiempo]) flujo[keyTiempo]=0;
     flujo[keyTiempo]++;
   }

 });

 let html="";

 // 🔥 1. COMPARATIVA TICKETERA/ZONA
 html+=`<h2>COMPARATIVA POR TICKETERA / ZONA</h2>
 <table>
 <tr><th>Origen</th><th>Pendientes</th><th>Usadas</th><th>Totales</th></tr>`;

 for(let k in combo){
   html+=`
   <tr>
     <td>${k}</td>
     <td>${combo[k].pend}</td>
     <td>${combo[k].used}</td>
     <td>${combo[k].total}</td>
   </tr>`;
 }

 html+="</table><br>";

 // 🔥 2. POR TICKETERA
 html+=`<h2>COMPARATIVA POR TICKETERA</h2>
 <table>
 <tr><th>Ticketera</th><th>Pendientes</th><th>Usadas</th><th>Totales</th></tr>`;

 for(let t in porTicket){
   html+=`
   <tr>
     <td>${t}</td>
     <td>${porTicket[t].pend}</td>
     <td>${porTicket[t].used}</td>
     <td>${porTicket[t].total}</td>
   </tr>`;
 }

 html+="</table><br>";

 // 🔥 3. POR ZONA
 html+=`<h2>COMPARATIVA POR ZONAS</h2>
 <table>
 <tr><th>Zona</th><th>Pendientes</th><th>Usadas</th><th>Totales</th></tr>`;

 for(let z in porZona){
   html+=`
   <tr>
     <td>${z}</td>
     <td>${porZona[z].pend}</td>
     <td>${porZona[z].used}</td>
     <td>${porZona[z].total}</td>
   </tr>`;
 }

 html+="</table><br>";

 // 🔹 RESUMEN GLOBAL
 html+=`
 <h2>RESUMEN GLOBAL</h2>
 <div class="card">
   Total: ${total}<br>
   Usadas: ${usados}<br>
   Pendientes: ${pendientes}
 </div>
 `;

 document.getElementById("tablaStats").innerHTML = html;

 // 🔥 GRAFICO FLUJO 20 MIN
 const labels = Object.keys(flujo).sort((a,b)=>
   a.localeCompare(b, undefined, {numeric:true})
 );

 const valores = labels.map(l=>flujo[l]);

 if(chartFlujo) chartFlujo.destroy();

 chartFlujo = new Chart(document.getElementById("graficoFlujo"),{
   type:"line",
   data:{
     labels:labels,
     datasets:[{
       label:"Accesos cada 20 min",
       data:valores,
       fill:true
     }]
   }
 });
}

// INCIDENCIAS
//////////////////////////////////////////////////

async function cargarInc(){

 const {data,error} = await client
   .from("codes")
   .select("*,zones(name),ticket_providers(name)")
   .eq("event_id",currentEvent);

 if(error || !data){
   console.log("Error incidencias", error);
   return;
 }

 // 🔥 ORDEN POR RIESGO
 data.sort((a,b)=>{

   function getPrioridad(c){

     if(c.status==="cancelled") return 0;

     if(
       c.first_entry_device_id &&
       c.last_exit_device_id &&
       c.first_entry_device_id !== c.last_exit_device_id
     ) return 3; // fraude

     if(c.usage_count > 1) return 2; // sospechoso

     if(c.usage_count > 0) return 1; // usado

     return 0;
   }

   return getPrioridad(b) - getPrioridad(a);
 });

 // 🔥 RENDER
 document.getElementById("tablaInc").innerHTML =
 data.map(c=>{

   let estado="Pendiente";
   let color="#22c55e";

   if(c.status==="cancelled"){
     estado="Cancelado";
     color="#6b7280";
   }
   else if(
     c.first_entry_device_id &&
     c.last_exit_device_id &&
     c.first_entry_device_id !== c.last_exit_device_id
   ){
     estado="Fraude";
     color="#ef4444";
   }
   else if(c.usage_count > 1){
     estado="Sospechoso";
     color="#f59e0b";
   }
   else if(c.is_top_code){
     estado="Multiread";
     color="#8b5cf6";
   }
   else if(c.usage_count > 0){
     estado="Usado";
   }

   return `
   <tr>
     <td>${c.code_value}</td>

     <td>${c.zones?.name || ""}</td>

     <td>${c.ticket_providers?.name || ""}</td>

     <td>${c.usage_count}</td>

     <td>
       <div style="
         background:${color};
         color:white;
         padding:5px;
         border-radius:6px;
         font-size:12px;
         font-weight:bold;
       ">
         ${estado}
       </div>
     </td>

     <td style="font-size:12px;text-align:left;">

       <div>
         <b>Entrada</b><br>
         ⏱ ${c.first_entry_at ? new Date(c.first_entry_at).toLocaleTimeString() : "-"}<br>
         📱 ${c.first_entry_device_id || "-"}
       </div>

       <div style="margin-top:6px;">
         <b>Última salida</b><br>
         ⏱ ${c.last_exit_at ? new Date(c.last_exit_at).toLocaleTimeString() : "-"}<br>
         📱 ${c.last_exit_device_id || "-"}
       </div>

       <div style="margin-top:6px;">
         <b>Intentos</b><br>
         ${c.usage_count} uso(s)<br>
         ${c.usage_count > 1 ? "⚠️ múltiples accesos" : "✅ acceso normal"}
       </div>

     </td>

     <td>
  ${
    bloquearAccionesIncidencias
    ? `<span style="color:#888;font-size:12px;">Solo lectura</span>`
    : `
      <button onclick="usar('${c.id}')">✔</button>
      <button onclick="reset('${c.id}')">↺</button>
      <button onclick="cancelar('${c.id}')">✖</button>
      <button onclick="multi('${c.id}')">M</button>
    `
  }
</td>
   </tr>`;
 }).join("");
}

async function usar(id){
 await client.from("codes").update({usage_count:1}).eq("id",id);
}

async function reset(id){
 await client.from("codes").update({usage_count:0}).eq("id",id);
}

async function cancelar(id){
 await client.from("codes").update({status:"cancelled"}).eq("id",id);
}

async function multi(id){
 await client.from("codes").update({is_top_code:true}).eq("id",id);
}

async function subir(){

 const file=document.getElementById("fileInput").files[0];
 if(!file) return alert("Selecciona archivo");

 const text=await file.text();
 const lines=text.split("\n");

 if(lines.length<2) return alert("Archivo vacío");

 // 🔹 DETECTAR CABECERAS
 const headers = lines[0].toLowerCase().split(";");

 const idxCodigo = headers.findIndex(h => h.includes("code") || h.includes("codigo"));
 const idxZona = headers.findIndex(h => h.includes("zone") || h.includes("zona"));
 const idxTicket = headers.findIndex(h => h.includes("ticket") || h.includes("provider"));

 if(idxCodigo === -1) return alert("No se detecta columna código");

 // 🔹 CARGAR DATOS EXISTENTES
 const {data:exist} = await client
   .from("codes")
   .select("code_value")
   .eq("event_id",currentEvent);

 const existentes = new Set((exist || []).map(e=>e.code_value));

 const {data:zonas} = await client.from("zones").select("*");
 const {data:ticket} = await client.from("ticket_providers").select("*");

 const zonasMap = {};
 zonas.forEach(z=>zonasMap[z.name.toLowerCase()] = z);

 const ticketMap = {};
 ticket.forEach(t=>ticketMap[t.name.toLowerCase()] = t);

 const insertar=[];

 // 🔹 PROCESAR FILAS
 for(let i=1;i<lines.length;i++){

   const cols = lines[i].split(";");

   const codigo = cols[idxCodigo]?.trim();
   if(!codigo || existentes.has(codigo)) continue;

   let zonaId=null;
   let ticketId=null;

   // 🔹 ZONA
   if(idxZona !== -1){
     const nombreZona = cols[idxZona]?.trim().toLowerCase();

     if(nombreZona){
       if(!zonasMap[nombreZona]){
         const {data:newZona} = await client.from("zones").insert({name:nombreZona}).select().single();
         zonasMap[nombreZona] = newZona;
       }
       zonaId = zonasMap[nombreZona].id;
     }
   }

   // 🔹 TICKETERA
   if(idxTicket !== -1){
     const nombreTicket = cols[idxTicket]?.trim().toLowerCase();

     if(nombreTicket){
       if(!ticketMap[nombreTicket]){
         const {data:newTicket} = await client.from("ticket_providers").insert({name:nombreTicket}).select().single();
         ticketMap[nombreTicket] = newTicket;
       }
       ticketId = ticketMap[nombreTicket].id;
     }
   }

   insertar.push({
     event_id:currentEvent,
     code_value:codigo,
     zone_id:zonaId,
     ticket_provider_id:ticketId,
     status:"valid",
     usage_count:0
   });
 }

 if(insertar.length===0) return alert("No hay nuevos códigos");

 await client.from("codes").insert(insertar);

 alert("CSV inteligente cargado correctamente");
}

async function generarPDF(){

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 // 🔹 EVENTO
 const {data:evento} = await client
   .from("events")
   .select("*")
   .eq("id",currentEvent)
   .single();

 const nombre = evento?.name || "";
 const recinto = evento?.venue || "";
 const fecha = evento?.event_date || "";

 let y = 15;

 // 🔥 LOGO CENTRADO (SIN DEFORMAR)
 try{
   const img = new Image();
   img.src = "logo.png";

   await new Promise(res=>img.onload=res);

   const width = 50;
   const height = (img.height / img.width) * width;

   const x = (210 - width) / 2;

   doc.addImage(img, "PNG", x, y, width, height);
   y += height + 10;

 }catch(e){}

 // 🔹 CABECERA
 doc.setFont("helvetica","bold");
 doc.setFontSize(16);
 doc.text("INFORME EVENTO", 105, y, {align:"center"});

 y += 10;

 doc.setFont("helvetica","normal");
 doc.setFontSize(11);

 doc.text(`Evento: ${nombre}`, 10, y);
 y+=6;
 doc.text(`Recinto: ${recinto}`, 10, y);
 y+=6;
 doc.text(`Fecha: ${fecha}`, 10, y);

 y+=10;

 // 🔥 FUNCION PARA TABLAS
 function dibujarTabla(titulo, dataObj){

   doc.setFont("helvetica","bold");
   doc.text(titulo, 10, y);
   y+=6;

   doc.setFontSize(10);

   // cabecera
   doc.setFont("helvetica","bold");
   doc.text("Origen", 10, y);
   doc.text("Pend.", 100, y);
   doc.text("Usadas", 130, y);
   doc.text("Total", 170, y);

   y+=5;

   doc.setFont("helvetica","normal");

   for(let k in dataObj){

     doc.text(String(k), 10, y);
     doc.text(String(dataObj[k].pend), 100, y);
     doc.text(String(dataObj[k].used), 130, y);
     doc.text(String(dataObj[k].total), 170, y);

     y+=5;

     if(y>270){
       doc.addPage();
       y=15;
     }
   }

   y+=8;
 }

 // 🔹 REUTILIZAMOS DATOS DEL FRONT
 const {data}=await client.from("codes")
   .select("*,zones(name),ticket_providers(name)")
   .eq("event_id",currentEvent);

 const combo={}, porTicket={}, porZona={};

 data.forEach(c=>{
   const zona=c.zones?.name || "Sin zona";
   const ticket=c.ticket_providers?.name || "Sin ticketera";
   const key = ticket+" "+zona;

   const usado = c.usage_count>0;

   if(!combo[key]) combo[key]={used:0,pend:0,total:0};
   combo[key].total++;
   usado ? combo[key].used++ : combo[key].pend++;

   if(!porTicket[ticket]) porTicket[ticket]={used:0,pend:0,total:0};
   porTicket[ticket].total++;
   usado ? porTicket[ticket].used++ : porTicket[ticket].pend++;

   if(!porZona[zona]) porZona[zona]={used:0,pend:0,total:0};
   porZona[zona].total++;
   usado ? porZona[zona].used++ : porZona[zona].pend++;
 });

 // 🔥 TABLAS BIEN FORMATEADAS
 dibujarTabla("COMPARATIVA TICKETERA / ZONA", combo);
 dibujarTabla("COMPARATIVA POR TICKETERA", porTicket);
 dibujarTabla("COMPARATIVA POR ZONAS", porZona);

 // 🔥 GRAFICO FLUJO (PAGINA NUEVA)
 const canvas = document.getElementById("graficoFlujo");

 if(canvas){
   const imgData = canvas.toDataURL("image/png");

   doc.addPage();

   doc.setFont("helvetica","bold");
   doc.setFontSize(14);
   doc.text("FLUJO DE ACCESOS CADA 20 MIN", 105, 15, {align:"center"});

   doc.addImage(imgData, "PNG", 10, 25, 190, 100);
 }

 // 🔥 NOMBRE ARCHIVO
 const nombreArchivo = `${nombre}_${fecha}.pdf`.replace(/\s+/g,"_");

 doc.save(nombreArchivo);
}

  function getColorAforo(p){
 if(p <= 75) return "#22c55e";
 if(p <= 89) return "#f59e0b";
 return "#ef4444";
}
  function animarNumero(id, valorFinal, texto=""){

 let actual = 0;
 const incremento = Math.ceil(valorFinal / 30);

 const intervalo = setInterval(()=>{
   actual += incremento;

   if(actual >= valorFinal){
     actual = valorFinal;
     clearInterval(intervalo);
   }

   document.getElementById(id).innerText = actual + texto;
 }, 30);
}

async function cargarPublico(){

 const {data:evento} = await client
   .from("events")
   .select("*")
   .eq("id",modoPublico)
   .single();

 const {data:codes} = await client
   .from("codes")
   .select("*,zones(name)")
   .eq("event_id",modoPublico);

 let total = 0;
 let usados = 0;
 const zonas = {};

 codes.forEach(c=>{
   total++;
   if(c.usage_count > 0) usados++;

   const z = c.zones?.name || "General";

   if(!zonas[z]) zonas[z] = {used:0,total:0};

   zonas[z].total++;
   if(c.usage_count > 0) zonas[z].used++;
 });

 const porcentaje = total ? Math.round((usados/total)*100) : 0;
 const color = getColorAforo(porcentaje);

 // 🔥 CABECERA
 document.getElementById("tituloEvento").innerHTML = `
   <div style="color:#111;text-align:center;">
     <b>${evento.venue}</b><br>
     ${evento.name}<br>
     ${evento.event_date}
   </div>
 `;

 // 🔥 BLOQUE PRINCIPAL
 document.getElementById("datos").innerHTML = `
   <div id="contadorAfluencia" style="
     background:${color};
     color:white;
     padding:15px;
     margin-bottom:10px;
     font-size:22px;
     font-weight:bold;
     text-align:center;
     border-radius:10px;
   ">
     0 afluencia
   </div>

   <div id="contadorTotal" style="
     background:#022c22;
     color:white;
     padding:15px;
     margin-bottom:10px;
     font-size:18px;
     text-align:center;
     border-radius:10px;
   ">
     0 códigos recibidos
   </div>

   <div style="
     text-align:center;
     font-size:20px;
     margin-top:10px;
     color:#111;
     font-weight:600;
   ">
     AFLUENCIA TOTAL <b>${porcentaje}%</b>
   </div>

   <div style="
     background:#e5e7eb;
     height:14px;
     border-radius:10px;
     margin:10px 0;
     overflow:hidden;
   ">
     <div class="progress-bar smooth" style="
       width:${porcentaje}%;
       background:${color};
       height:100%;
     "></div>
   </div>
 `;

 // 🔥 ANIMACIONES (DESPUÉS del HTML)
 animarNumero("contadorAfluencia", usados, " afluencia");
 animarNumero("contadorTotal", total, " códigos recibidos");

 // 🔥 ZONAS
 let html = "";

 for(let z in zonas){

   const p = Math.round((zonas[z].used/zonas[z].total)*100);
   const colorZona = getColorAforo(p);

   html += `
     <div style="margin-bottom:15px;">

       <div style="
         text-align:center;
         margin:6px 0;
         color:#111;
         font-weight:600;
         font-size:14px;
       ">
         ${z} ${p}%
       </div>

       <div style="
         background:#e5e7eb;
         height:10px;
         border-radius:10px;
         overflow:hidden;
       ">

         <div class="progress-bar smooth" style="
           width:${p}%;
           background:${colorZona};
           height:100%;
         "></div>

       </div>

     </div>
   `;
 }

 document.getElementById("zonas").innerHTML = html;
}
