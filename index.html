<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    table {
      width: 100%;
      background: #1e293b;
      border-radius: 10px;
      padding: 10px;
    }

    td, th {
      padding: 10px;
      text-align: center;
    }

    .back { margin-bottom: 20px; }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🎟️ Top Access</h1>
  <button onclick="irSeleccionar()">Seleccionar evento</button>
</div>

<!-- EVENTOS -->
<div id="listaEventos" class="hidden">
  <button class="back" onclick="volverInicio()">⬅ Volver</button>
  <div id="contenedorEventos"></div>
</div>

<!-- GESTION -->
<div id="gestionarEvento" class="hidden">
  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="irEstadisticas()">📊 Estadísticas</button>
</div>

<!-- ESTADISTICAS -->
<div id="estadisticas" class="hidden">

  <button class="back" onclick="volverGestion()">⬅ Volver</button>

  <h2>📊 Estadísticas</h2>

  <table>
    <thead>
      <tr>
        <th>Zona</th>
        <th>Ticketera</th>
        <th>Pendientes</th>
        <th>Usadas</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tablaStats"></tbody>
  </table>

</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ocultarTodo() {
  document.querySelectorAll("div").forEach(d => d.classList.add("hidden"));
}

function volverInicio() {
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function volverGestion() {
  ocultarTodo();
  document.getElementById("gestionarEvento").classList.remove("hidden");
}

function irSeleccionar() {
  ocultarTodo();
  document.getElementById("listaEventos").classList.remove("hidden");
  cargarEventos();
}

function irEstadisticas() {
  ocultarTodo();
  document.getElementById("estadisticas").classList.remove("hidden");
  cargarEstadisticas();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "";

  data.forEach(e => {
    const btn = document.createElement("button");
    btn.textContent = e.name;
    btn.onclick = () => {
      currentEvent = e.id;
      ocultarTodo();
      document.getElementById("gestionarEvento").classList.remove("hidden");
    };
    cont.appendChild(btn);
  });
}

// ESTADISTICAS
async function cargarEstadisticas() {

  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  const resumen = {};

  data.forEach(c => {

    const zona = c.zone_id || "Sin zona";
    const ticket = c.ticket_provider_id || "Sin ticketera";

    const key = zona + "_" + ticket;

    if (!resumen[key]) {
      resumen[key] = {
        zona,
        ticket,
        usadas: 0,
        pendientes: 0
      };
    }

    if (c.status === "used") {
      resumen[key].usadas++;
    } else {
      resumen[key].pendientes++;
    }
  });

  const tbody = document.getElementById("tablaStats");
  tbody.innerHTML = "";

  Object.values(resumen).forEach(r => {

    const total = r.usadas + r.pendientes;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.zona}</td>
      <td>${r.ticket}</td>
      <td>${r.pendientes}</td>
      <td>${r.usadas}</td>
      <td>${total}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
