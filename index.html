<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px;}
    .screen{display:none;} .active{display:block;}
    button{padding:6px;margin:3px;border:none;border-radius:6px;background:#1e293b;color:white;}
    table{width:100%;border-collapse:collapse;margin-top:10px;}
    td,th{padding:6px;border-bottom:1px solid #333;}
  </style>
</head>

<body>

<div id="menu" class="screen active">
  <h1>⚙️ Gestión</h1>
  <button onclick="ir('stats')">📊 Estadísticas</button>
  <button onclick="ir('inc')">⚠️ Incidencias</button>
</div>

<div id="stats" class="screen">
  <h1>📊 Estadísticas</h1>
  <button onclick="ir('menu')">⬅</button>
  <div id="tablaStats"></div>
</div>

<div id="inc" class="screen">
  <h1>⚠️ Incidencias</h1>
  <button onclick="ir('menu')">⬅</button>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Zona</th>
        <th>Ticketera</th>
        <th>Usos</th>
        <th>Primera entrada</th>
        <th>Dispositivo</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaInc"></tbody>
  </table>
</div>

<script>
const client = window.supabase.createClient(
 "https://zuhssrhdezptsgemxofh.supabase.co",
 "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = "d8026425-6e24-4b8a-8891-4ac81057e6f2";

function ir(p){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(p).classList.add("active");

 if(p==="stats") cargarStats();
 if(p==="inc") cargarInc();
}

//////////////////////////////////////////////////
// 📊 ESTADÍSTICAS (CORRECTAS)
//////////////////////////////////////////////////

async function cargarStats(){

 const {data}=await client
   .from("codes")
   .select("*, zones(name), ticket_providers(name)")
   .eq("event_id",currentEvent);

 const agrupado={};

 data.forEach(c=>{

   const key = (c.zones?.name || "Sin zona") + " - " + (c.ticket_providers?.name || "Sin ticketera");

   if(!agrupado[key]){
     agrupado[key]={pend:0, used:0, total:0};
   }

   agrupado[key].total++;

   if(c.usage_count === 0) agrupado[key].pend++;
   if(c.usage_count > 0) agrupado[key].used++;

 });

 let html="<table><tr><th>Origen</th><th>Pendientes</th><th>Usadas</th><th>Total</th></tr>";

 for(let k in agrupado){
   html+=`<tr>
     <td>${k}</td>
     <td>${agrupado[k].pend}</td>
     <td>${agrupado[k].used}</td>
     <td>${agrupado[k].total}</td>
   </tr>`;
 }

 html+="</table>";

 document.getElementById("tablaStats").innerHTML=html;
}

//////////////////////////////////////////////////
// ⚠️ INCIDENCIAS (PRO)
//////////////////////////////////////////////////

async function cargarInc(){

 const {data}=await client
   .from("codes")
   .select("*, zones(name), ticket_providers(name)")
   .eq("event_id",currentEvent);

 const tbody=document.getElementById("tablaInc");
 tbody.innerHTML="";

 data.forEach(c=>{

   let estado="Pendiente";

   if(c.status==="cancelled") estado="Cancelado";
   else if(c.is_top_code) estado="Multiread";
   else if(c.usage_count>0) estado="Usado";

   tbody.innerHTML+=`
   <tr>
     <td>${c.code_value}</td>
     <td>${c.zones?.name||""}</td>
     <td>${c.ticket_providers?.name||""}</td>
     <td>${c.usage_count}</td>
     <td>${c.first_entry_at || "-"}</td>
     <td>${c.first_entry_device_id || "-"}</td>
     <td>${estado}</td>
     <td>
       <button onclick="usar('${c.id}')">Usar</button>
       <button onclick="reset('${c.id}')">Reset</button>
       <button onclick="cancel('${c.id}')">Cancel</button>
       <button onclick="multi('${c.id}')">Multi</button>
     </td>
   </tr>`;
 });
}

//////////////////////////////////////////////////
// ✏️ ACCIONES REALES
//////////////////////////////////////////////////

async function usar(id){
 await client.from("codes").update({
   usage_count:1,
   first_entry_at:new Date(),
   first_entry_device_id:"web"
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function reset(id){
 await client.from("codes").update({
   usage_count:0,
   first_entry_at:null,
   first_entry_device_id:null
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function cancel(id){
 await client.from("codes").update({
   status:"cancelled"
 }).eq("id",id);

 cargarInc(); cargarStats();
}

async function multi(id){
 await client.from("codes").update({
   is_top_code:true
 }).eq("id",id);

 alert("MULTIREAD activado");
}
</script>

</body>
</html>
