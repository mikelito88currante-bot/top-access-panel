<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    input {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="mostrar('listaEventos')">Seleccionar evento</button>
</div>

<!-- EVENTOS -->
<div id="listaEventos" class="screen">
  <button onclick="mostrar('home')">⬅ Volver</button>
  <div id="contenedorEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="mostrar('listaEventos')">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="mostrar('incidencias')">⚠️ Incidencias</button>
  <button onclick="mostrar('upload')">📂 Cargar Excel</button>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="mostrar('gestion')">⬅ Volver</button>

  <h2>📂 Cargar códigos (CSV)</h2>

  <input type="file" id="fileInput">

  <br>
  <button onclick="procesarArchivo()">Subir archivo</button>

  <div id="resultado"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aHNzcmhkZXpwdHNnZW14b2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNzE5MjcsImV4cCI6MjA4NTk0NzkyN30.Tb0y2zGuy3hGRimE5SY4zHIY8FMfgYt9uDofVQeKBX0"
);

let currentEvent = null;

// NAV
function mostrar(id) {
  document.querySelectorAll(".screen").forEach(d => d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "listaEventos") cargarEventos();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");

    div.innerHTML = `
      <strong>${e.name}</strong><br>
      <button onclick="seleccionarEvento('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function seleccionarEvento(id) {
  currentEvent = id;
  mostrar("gestion");
}

// PROCESAR CSV
async function procesarArchivo() {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Selecciona un archivo");
    return;
  }

  const text = await file.text();
  const lines = text.split("\n");

  const headers = lines[0].split(",");

  let nuevos = 0;
  let duplicados = 0;

  // 🔥 TRAER CÓDIGOS EXISTENTES
  const { data: existentes } = await client
    .from("codes")
    .select("code_value")
    .eq("event_id", currentEvent);

  const setExistentes = new Set(existentes.map(c => c.code_value));

  const insertar = [];

  for (let i = 1; i < lines.length; i++) {

    const cols = lines[i].split(",");

    if (!cols[0]) continue;

    const codigo = cols[0].trim();
    const zona = cols[2] || null;
    const operador = cols[3] || null;

    if (setExistentes.has(codigo)) {
      duplicados++;
      continue;
    }

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid",
      zone_id: zona,
      ticket_provider_id: operador,
      usage_count: 0
    });

    nuevos++;
  }

  if (insertar.length > 0) {
    await client.from("codes").insert(insertar);
  }

  document.getElementById("resultado").innerHTML = `
    ✅ Nuevos: ${nuevos}<br>
    ⚠️ Duplicados ignorados: ${duplicados}
  `;
}
</script>

</body>
</html>
