<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="mostrar('listaEventos')">Seleccionar evento</button>
</div>

<!-- EVENTOS -->
<div id="listaEventos" class="screen">
  <button onclick="mostrar('home')">⬅ Volver</button>
  <div id="contenedorEventos"></div>
</div>

<!-- GESTION -->
<div id="gestion" class="screen">
  <button onclick="mostrar('listaEventos')">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <button onclick="mostrar('estadisticas')">📊 Estadísticas</button>
  <button onclick="mostrar('incidencias')">⚠️ Incidencias</button>
  <button onclick="mostrar('upload')">📂 Cargar Excel</button>
</div>

<!-- ESTADISTICAS -->
<div id="estadisticas" class="screen">
  <button onclick="mostrar('gestion')">⬅ Volver</button>

  <h2>📊 Estadísticas</h2>
  <div id="stats"></div>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="screen">
  <button onclick="mostrar('gestion')">⬅ Volver</button>

  <h2>⚠️ Incidencias</h2>

  <input id="buscador" placeholder="Buscar código..." oninput="filtrar()">

  <ul id="listaCodigos"></ul>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <button onclick="mostrar('gestion')">⬅ Volver</button>

  <h2>📂 Subir CSV</h2>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir</button>

  <div id="resultado"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1aHNzcmhkZXpwdHNnZW14b2ZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nz03NzAzNzE5MjcsImV4cCI6MjA4NTk0NzkyN30.Tb0y2zGuy3hGRimE5SY4zHIY8FMfgYt9uDofVQeKBX0"
);

let currentEvent = null;
let codigos = [];

// NAV CENTRAL (CLAVE)
function mostrar(id) {
  document.querySelectorAll(".screen").forEach(d => d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "listaEventos") cargarEventos();
  if (id === "estadisticas") cargarStats();
  if (id === "incidencias") cargarIncidencias();
}

// EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("*");

  const cont = document.getElementById("contenedorEventos");
  cont.innerHTML = "";

  data.forEach(e => {
    const div = document.createElement("div");

    div.innerHTML = `
      <strong>${e.name}</strong>
      <button onclick="seleccionar('${e.id}')">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

function seleccionar(id) {
  currentEvent = id;
  mostrar("gestion");
}

// ESTADISTICAS
async function cargarStats() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  document.getElementById("stats").innerHTML =
    "Total códigos: " + (data?.length || 0);
}

// INCIDENCIAS
async function cargarIncidencias() {
  const { data } = await client
    .from("codes")
    .select("*")
    .eq("event_id", currentEvent);

  codigos = data;
  pintar(data);
}

function filtrar() {
  const txt = document.getElementById("buscador").value.toLowerCase();

  const filtrados = codigos.filter(c =>
    c.code_value.toLowerCase().includes(txt)
  );

  pintar(filtrados);
}

function pintar(lista) {
  const ul = document.getElementById("listaCodigos");
  ul.innerHTML = "";

  lista.forEach(c => {
    const li = document.createElement("li");
    li.textContent = c.code_value + " - " + c.status;
    ul.appendChild(li);
  });
}

// UPLOAD
async function subir() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) return alert("Selecciona archivo");

  const text = await file.text();
  const lines = text.split("\n");

  let nuevos = 0;
  let duplicados = 0;

  const { data: existentes } = await client
    .from("codes")
    .select("code_value")
    .eq("event_id", currentEvent);

  const set = new Set(existentes.map(c => c.code_value));

  const insertar = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",");

    const codigo = cols[0]?.trim();
    if (!codigo) continue;

    if (set.has(codigo)) {
      duplicados++;
      continue;
    }

    insertar.push({
      event_id: currentEvent,
      code_value: codigo,
      status: "valid"
    });

    nuevos++;
  }

  if (insertar.length > 0) {
    await client.from("codes").insert(insertar);
  }

  document.getElementById("resultado").innerHTML =
    `Nuevos: ${nuevos} | Duplicados: ${duplicados}`;
}
</script>

</body>
</html>
