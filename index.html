<!DOCTYPE html>
<html>
<head>
  <title>Top Access Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 300px;
    }

    .menu button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .menu button:hover {
      background: #334155;
    }

    .hidden {
      display: none;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
    }

    .title {
      font-size: 14px;
      color: #94a3b8;
    }

    .value {
      font-size: 28px;
      margin-top: 10px;
    }

    ul {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    canvas {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .back {
      margin-bottom: 20px;
      padding: 10px;
      background: #334155;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- 🔥 PANTALLA INICIO -->
  <div id="home">

    <h1>🎟️ Top Access</h1>

    <div class="menu">
      <button onclick="irDashboard()">Seleccionar evento</button>
      <button>Crear evento</button>
      <button>Usuarios</button>
      <button>Configuración de zonas</button>
      <button>Configuración de localizaciones</button>
    </div>

  </div>

  <!-- 🔥 DASHBOARD -->
  <div id="dashboard" class="hidden">

    <button class="back" onclick="volverInicio()">⬅ Volver</button>

    <h1>📊 Dashboard</h1>

    <select id="eventSelector"></select>

    <div class="cards">
      <div class="card">
        <div class="title">Aforo actual</div>
        <div class="value" id="aforo">0</div>
      </div>

      <div class="card">
        <div class="title">Entradas</div>
        <div class="value" id="entradas">0</div>
      </div>

      <div class="card">
        <div class="title">Salidas</div>
        <div class="value" id="salidas">0</div>
      </div>
    </div>

    <h2>Últimos accesos</h2>
    <ul id="logs"></ul>

    <h2>Entradas por minuto</h2>
    <canvas id="grafico" height="100"></canvas>

  </div>

  <script>
    const client = window.supabase.createClient(
      "https://zuhssrhdezptsgemxofh.supabase.co",
      "TU_KEY"
    );

    let chart;
    let selectedEvent = null;

    // 🔥 NAVEGACIÓN
    function irDashboard() {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      cargarEventos();
    }

    function volverInicio() {
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
    }

    // 🔥 EVENTOS
    async function cargarEventos() {
      const { data } = await client
        .from("events")
        .select("id, name");

      const selector = document.getElementById("eventSelector");
      selector.innerHTML = "";

      data.forEach(event => {
        const option = document.createElement("option");
        option.value = event.id;
        option.textContent = event.name || event.id;
        selector.appendChild(option);
      });

      if (data.length > 0) {
        selectedEvent = data[0].id;
        selector.value = selectedEvent;
        cargarDatos();
      }
    }

    document.getElementById("eventSelector").addEventListener("change", (e) => {
      selectedEvent = e.target.value;
      cargarDatos();
    });

    async function cargarDatos() {
      if (!selectedEvent) return;

      const { data } = await client
        .from("logs")
        .select("*")
        .eq("event_id", selectedEvent);

      let entradas = 0;
      let salidas = 0;
      const porMinuto = {};

      data.forEach(log => {
        if (log.action_type === "entry") entradas++;
        if (log.action_type === "exit") salidas++;

        const fecha = new Date(log.created_at);
        const minuto = fecha.getHours() + ":" + String(fecha.getMinutes()).padStart(2, "0");

        if (!porMinuto[minuto]) porMinuto[minuto] = 0;

        if (log.action_type === "entry") {
          porMinuto[minuto]++;
        }
      });

      document.getElementById("entradas").textContent = entradas;
      document.getElementById("salidas").textContent = salidas;
      document.getElementById("aforo").textContent = entradas - salidas;

      const lista = document.getElementById("logs");
      lista.innerHTML = "";

      data.slice(-20).reverse().forEach(log => {
        const li = document.createElement("li");
        li.textContent = log.action_type + " - " + log.created_at;
        lista.appendChild(li);
      });

      const labels = Object.keys(porMinuto);
      const valores = Object.values(porMinuto);

      if (chart) chart.destroy();

      const ctx = document.getElementById("grafico").getContext("2d");

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: "Entradas por minuto",
            data: valores
          }]
        }
      });
    }

    setInterval(cargarDatos, 5000);
  </script>

</body>
</html>
