<!DOCTYPE html>
<html>
<head>
  <title>Top Access</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .menu { display: flex; flex-direction: column; gap: 15px; max-width: 300px; }

    button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    select, input {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
    }

    .back { margin-bottom: 20px; background: #334155; }
  </style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🎟️ Top Access</h1>

  <div class="menu">
    <button onclick="irSeleccionarEvento()">Seleccionar evento</button>
    <button onclick="irCrearEvento()">Crear evento</button>
  </div>
</div>

<!-- SELECCIONAR EVENTO -->
<div id="seleccionarEvento" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h2>Seleccionar evento</h2>

  <select id="eventSelector"></select>

  <br>
  <button onclick="entrarEvento()">Entrar</button>

</div>

<!-- GESTIONAR EVENTO -->
<div id="gestionarEvento" class="hidden">

  <button class="back" onclick="volverInicio()">⬅ Volver</button>

  <h2>Gestión del evento</h2>

  <h3>Subir códigos (CSV)</h3>

  <input type="file" id="fileInput" accept=".csv">

  <br>
  <button onclick="subirCSV()">Subir códigos</button>

</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let selectedEvent = null;

// NAVEGACIÓN
function ocultarTodo() {
  document.querySelectorAll("div").forEach(d => d.classList.add("hidden"));
}

function volverInicio() {
  ocultarTodo();
  document.getElementById("home").classList.remove("hidden");
}

function irSeleccionarEvento() {
  ocultarTodo();
  document.getElementById("seleccionarEvento").classList.remove("hidden");
  cargarEventos();
}

function entrarEvento() {
  selectedEvent = document.getElementById("eventSelector").value;
  ocultarTodo();
  document.getElementById("gestionarEvento").classList.remove("hidden");
}

// CARGAR EVENTOS
async function cargarEventos() {
  const { data } = await client.from("events").select("id,name");

  const selector = document.getElementById("eventSelector");
  selector.innerHTML = "";

  data.forEach(e => {
    const opt = document.createElement("option");
    opt.value = e.id;
    opt.textContent = e.name;
    selector.appendChild(opt);
  });
}

// SUBIR CSV
async function subirCSV() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Selecciona un archivo");
    return;
  }

  const text = await file.text();
  const lines = text.split("\n");

  const datos = [];

  for (let i = 1; i < lines.length; i++) {
    const [codigo] = lines[i].split(",");

    if (!codigo) continue;

    datos.push({
      event_id: selectedEvent,
      code_value: codigo.trim(),
      status: "valid",
      usage_count: 0,
      created_at: new Date().toISOString()
    });
  }

  const { error } = await client.from("codes").insert(datos);

  if (error) {
    console.error(error);
    alert("Error al subir");
  } else {
    alert("Códigos subidos correctamente");
  }
}
</script>

</body>
</html>
