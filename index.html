<!DOCTYPE html>
<html>
<head>
  <title>Top Access PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    .screen { display: none; }
    .active { display: block; }
    button { padding: 10px; margin: 5px; border-radius: 8px; border: none; background: #1e293b; color: white; cursor: pointer; }
    input { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
  </style>
</head>

<body>

<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="ir('crearEvento')">Crear evento</button>
  <button onclick="ir('eventos')">Seleccionar evento</button>
</div>

<div id="crearEvento" class="screen">
  <button onclick="ir('home')">⬅</button>

  <input id="eventoNombre" placeholder="Nombre">
  <input id="eventoLugar" placeholder="Lugar">

  <h3>Zonas</h3>
  <div id="zonasSeleccion"></div>

  <h3>Ticketeras</h3>
  <div id="ticketSeleccion"></div>

  <button onclick="guardarEvento()">Guardar</button>
</div>

<div id="eventos" class="screen">
  <button onclick="ir('home')">⬅</button>
  <div id="listaEventos"></div>
</div>

<div id="gestion" class="screen">
  <button onclick="ir('eventos')">⬅</button>
  <button onclick="ir('upload')">Subir CSV</button>
</div>

<div id="upload" class="screen">
  <button onclick="ir('gestion')">⬅</button>

  <input type="file" id="fileInput">
  <button onclick="subir()">Subir CSV inteligente</button>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

let currentEvent = null;

// NAV
function ir(p){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if(p==="crearEvento"){ cargarZonas(); cargarTickets(); }
  if(p==="eventos") cargarEventos();
}

// CARGAR ZONAS
async function cargarZonas(){
  const {data}=await client.from("zones").select("*");

  document.getElementById("zonasSeleccion").innerHTML =
    data.map(z=>`<input type="checkbox" value="${z.id}">${z.name}<br>`).join("");
}

// CARGAR TICKETERAS
async function cargarTickets(){
  const {data}=await client.from("ticket_providers").select("*");

  document.getElementById("ticketSeleccion").innerHTML =
    data.map(t=>`<input type="checkbox" value="${t.id}">${t.name}<br>`).join("");
}

// CREAR EVENTO
async function guardarEvento(){

  const name=document.getElementById("eventoNombre").value;
  const venue=document.getElementById("eventoLugar").value;

  const {data}=await client.from("events")
    .insert({name,venue,status:"active"})
    .select();

  const eventId=data[0].id;

  for(const z of document.querySelectorAll("#zonasSeleccion input:checked")){
    await client.from("event_zones").insert({
      event_id:eventId,
      zone_id:z.value
    });
  }

  for(const t of document.querySelectorAll("#ticketSeleccion input:checked")){
    await client.from("event_ticket_providers").insert({
      event_id:eventId,
      ticket_provider_id:t.value
    });
  }

  alert("Evento creado");
  ir("home");
}

// EVENTOS
async function cargarEventos(){
  const {data}=await client.from("events").select("*");

  document.getElementById("listaEventos").innerHTML =
    data.map(e=>`<div>${e.name} <button onclick="entrar('${e.id}')">Entrar</button></div>`).join("");
}

function entrar(id){
  currentEvent=id;
  ir("gestion");
}

// 🚀 SUBIDA CSV INTELIGENTE (CLAVE)
async function subir(){

  const file=document.getElementById("fileInput").files[0];
  if(!file) return alert("Selecciona archivo");

  const text=await file.text();
  const lines=text.split("\n");

  const {data:zonas}=await client.from("zones").select("*");
  const {data:tickets}=await client.from("ticket_providers").select("*");

  const insertar=[];

  for(let i=1;i<lines.length;i++){

    const cols=lines[i].split(",");

    const codigo=cols[0]?.trim();
    const nombreZona=cols[1]?.trim();
    const nombreTicket=cols[2]?.trim();

    if(!codigo) continue;

    const zona=zonas.find(z=>z.name.toLowerCase()===nombreZona?.toLowerCase());
    const ticket=tickets.find(t=>t.name.toLowerCase()===nombreTicket?.toLowerCase());

    if(!zona || !ticket){
      console.warn("Zona o ticket no encontrada:", nombreZona, nombreTicket);
      continue;
    }

    insertar.push({
      event_id:currentEvent,
      code_value:codigo,
      status:"valid",
      zone_id:zona.id,
      ticket_provider_id:ticket.id,
      usage_count:0
    });
  }

  const {error}=await client.from("codes").insert(insertar);

  if(error){
    alert(error.message);
    return;
  }

  alert("CSV cargado correctamente");
}
</script>

</body>
</html>
