<!DOCTYPE html>
<html>
<head>
  <title>Top Access DEBUG</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .screen { display: none; }
    .active { display: block; }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div id="home" class="screen active">
  <h1>🎟️ Top Access</h1>
  <button onclick="ir('zonas')">Crear zonas</button>
</div>

<div id="zonas" class="screen">
  <button onclick="ir('home')">⬅ Volver</button>

  <h2>Crear zona</h2>

  <input id="zonaNombre" placeholder="Nombre zona">
  <button onclick="crearZona()">Crear</button>

  <div id="resultado"></div>
  <div id="listaZonas"></div>
</div>

<script>
const client = window.supabase.createClient(
  "https://zuhssrhdezptsgemxofh.supabase.co",
  "sb_publishable_gc37cVjzIaudeAfNDP63Jg_ATzjSEVv"
);

// NAV
function ir(p) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(p).classList.add("active");

  if (p === "zonas") cargarZonas();
}

// 🔴 CREAR ZONA CON DEBUG
async function crearZona() {
  const nombre = document.getElementById("zonaNombre").value;

  if (!nombre) {
    alert("Introduce nombre");
    return;
  }

  const { data, error } = await client
    .from("zones")
    .insert({ name: nombre })
    .select();

  console.log("RESPUESTA:", data, error);

  if (error) {
    document.getElementById("resultado").innerText =
      "ERROR: " + error.message;
    alert("Error: " + error.message);
    return;
  }

  document.getElementById("resultado").innerText =
    "Zona creada correctamente";

  document.getElementById("zonaNombre").value = "";

  cargarZonas();
}

// LISTAR ZONAS
async function cargarZonas() {
  const { data, error } = await client.from("zones").select("*");

  const cont = document.getElementById("listaZonas");
  cont.innerHTML = "";

  if (error) {
    cont.innerHTML = "Error cargando zonas";
    return;
  }

  data.forEach(z => {
    cont.innerHTML += `<div class="card">${z.name}</div>`;
  });
}
</script>

</body>
</html>
