<!DOCTYPE html>
<html>
<head>
  <title>Top Access Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
    }

    .title {
      font-size: 14px;
      color: #94a3b8;
    }

    .value {
      font-size: 28px;
      margin-top: 10px;
    }

    ul {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🎟️ Top Access Dashboard</h1>

  <div class="cards">
    <div class="card">
      <div class="title">Aforo actual</div>
      <div class="value" id="aforo">0</div>
    </div>

    <div class="card">
      <div class="title">Entradas</div>
      <div class="value" id="entradas">0</div>
    </div>

    <div class="card">
      <div class="title">Salidas</div>
      <div class="value" id="salidas">0</div>
    </div>
  </div>

  <h2>Últimos accesos</h2>
  <ul id="logs"></ul>

  <script>
    const supabase = window.supabase.createClient(
      "https://zuhssrhdezptsgemxofh.supabase.co",
      "TU_KEY"
    );

    async function cargarDatos() {
      const { data } = await supabase
        .from("logs")
        .select("*");

      let entradas = 0;
      let salidas = 0;

      data.forEach(log => {
        if (log.result === "entry_ok") entradas++;
        if (log.result === "exit_ok") salidas++;
      });

      document.getElementById("entradas").textContent = entradas;
      document.getElementById("salidas").textContent = salidas;
      document.getElementById("aforo").textContent = entradas - salidas;

      // últimos accesos
      const lista = document.getElementById("logs");
      lista.innerHTML = "";

      data.slice(-20).reverse().forEach(log => {
        const li = document.createElement("li");
        li.textContent = log.result + " - " + log.created_at;
        lista.appendChild(li);
      });
    }

    cargarDatos();

    // 🔄 actualizar cada 5 segundos (como quieres en tu sistema)
    setInterval(cargarDatos, 5000);
  </script>

</body>
</html>
